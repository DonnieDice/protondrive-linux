name: build-aur
description: Build the native Arch AUR package.
runs:
  using: composite
  steps:
    - name: Install build dependencies
      shell: bash
      run: |
        pacman -Sy --noconfirm --needed bash git curl wget file pkg-config webkit2gtk-4.1 gtk3 libayatana-appindicator openssl librsvg libsoup3 nodejs npm python rustup base-devel patch

    - name: Install Rust
      shell: bash
      run: |
        rustup default "${RUST_VERSION}"
        rustc --version
        cargo --version

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          src-tauri/target/
        key: aur-arch-native-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
        restore-keys: |
          aur-arch-native-cargo-

    - name: Clone WebClients
      shell: bash
      run: |
        git clone --filter=blob:none --no-checkout https://github.com/ProtonMail/WebClients.git WebClients
        git -C WebClients fetch --depth=1 origin "${WEBCLIENTS_COMMIT}"
        git -C WebClients checkout --detach "${WEBCLIENTS_COMMIT}"

    - name: Apply distro patch
      shell: bash
      run: |
        AUR_PATCH="patches/aur/arch-native.patch"
        if [ -f "$AUR_PATCH" ]; then
          git apply "$AUR_PATCH"
          echo "Applied $AUR_PATCH"
        else
          echo "ERROR: No AUR patch found at $AUR_PATCH"
          exit 1
        fi

    - name: Build WebClients
      shell: bash
      run: |
        rm -rf /tmp/aur-output
        scripts/build-webclients.sh

    - name: Build Tauri binary
      shell: bash
      run: |
            VERSION=$(node -p "require('./package.json').version")
            sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
            sed -i "0,/^version = \"[^\"]*\"/s//version = \"$VERSION\"/" src-tauri/Cargo.toml
            npm install
            cargo build --manifest-path src-tauri/Cargo.toml --release

    - name: Build AUR package
      shell: bash
      run: |
            VERSION=$(node -p "require('./package.json').version")
            scripts/ci/build-aur-package.sh \
              "arch-native" \
              "$VERSION" \
              "src-tauri/target/release/proton-drive" \
              "src-tauri/icons"

    - name: Generate .SRCINFO
      shell: bash
      run: |
            cd packaging/aur
            VERSION=$(node -p "require('../../package.json').version")
            sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
            sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
            makepkg --printsrcinfo > .SRCINFO 2>/dev/null || true
            if [ ! -s .SRCINFO ]; then
              {
                echo "pkgbase = proton-drive"
                echo "pkgdesc = Unofficial Linux desktop client for Proton Drive, built with Tauri"
                echo "pkgver = ${VERSION}"
                echo "pkgrel = 1"
                echo "url = https://github.com/DonnieDice/protondrive-linux"
                echo "arch = x86_64"
                echo "license = AGPL-3.0-only"
                echo "depends = webkit2gtk-4.1"
                echo "depends = gtk3"
                echo "depends = libayatana-appindicator"
                echo "depends = openssl"
                echo "depends = libsoup3"
                echo "depends = librsvg"
                echo "makedepends = cargo"
                echo "makedepends = rust"
                echo "makedepends = nodejs"
                echo "makedepends = npm"
                echo "makedepends = git"
                echo "makedepends = pkg-config"
                echo "makedepends = patch"
                echo "makedepends = python"
                echo "optdepends = libappindicator-gtk3: system tray support (GNOME)"
                echo "conflicts = proton-drive-bin"
                echo "replaces = proton-drive-bin"
                echo "install = proton-drive.install"
                echo "options = !strip"
                echo "pkgname = proton-drive"
              } > .SRCINFO
            fi
            cat .SRCINFO

    - name: Write artifact manifest
      shell: bash
      run: |
        ARTIFACT_MANIFEST_DIR=/tmp/aur-output \
          bash scripts/ci/write-artifact-manifest.sh \
          aur-arch-native \
          aur \
          arch \
          x86_64 \
          "/tmp/aur-output/*.pkg.tar.zst"

    - name: Upload AUR package
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: aur-arch-native
        path: |
          /tmp/aur-output/*.pkg.tar.zst
          /tmp/aur-output/aur-arch-native.*
        if-no-files-found: error
        retention-days: 30

    - name: Write AUR metadata manifest
      shell: bash
      run: |
        ARTIFACT_MANIFEST_DIR=packaging/aur \
          bash scripts/ci/write-artifact-manifest.sh \
          aur-arch-native-srcinfo \
          aur-metadata \
          arch \
          x86_64 \
          "packaging/aur/.SRCINFO"

    - name: Upload AUR metadata
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: aur-arch-native-srcinfo
        path: |
          packaging/aur/.SRCINFO
          packaging/aur/aur-arch-native-srcinfo.*
        if-no-files-found: warn
        include-hidden-files: true
        retention-days: 30
