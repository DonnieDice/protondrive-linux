name: build-flatpak-gnome-49
description: Build the Flatpak package against GNOME 49.
runs:
  using: composite
  steps:
    - name: Install build dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bash git curl wget build-essential file pkg-config \
          libssl-dev libwebkit2gtk-4.1-dev libgtk-3-dev \
          libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev \
          patchelf python3 ca-certificates \
          libvips-dev libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev \
          flatpak flatpak-builder
        curl -fsSL https://deb.nodesource.com/setup_22.x | sudo bash -
        sudo apt-get install -y nodejs

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust
      shell: bash
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "${RUST_VERSION}"
        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
        . "$HOME/.cargo/env"
        rustc --version
        cargo --version

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          src-tauri/target/
        key: flatpak-gnome49-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
        restore-keys: flatpak-gnome49-cargo-

    - name: Clone WebClients
      shell: bash
      run: |
        git clone --depth=1 --single-branch --branch "${WEBCLIENTS_REF}" https://github.com/ProtonMail/WebClients.git WebClients

    - name: Apply distro patch
      shell: bash
      run: |
        DISTRO_PATCH="${{ github.event.inputs.distro_patch || 'org.gnome.Platform.49' }}"
        PATCH_FILE="patches/flatpak/${DISTRO_PATCH}.patch"
        if [ -f "$PATCH_FILE" ]; then
          git apply "$PATCH_FILE"
          echo "Applied $PATCH_FILE"
        else
          echo "WARNING: $PATCH_FILE not found, building without distro patch"
        fi

    - name: Build Flatpak
      shell: bash
      run: |
        . "$HOME/.cargo/env"
        rm -rf src-tauri/target/release/bundle/flatpak
        scripts/build-webclients.sh
        VERSION=$(node -p "require('./package.json').version")
        sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
        sed -i "0,/^version = \"[^\"]*\"/s//version = \"$VERSION\"/" src-tauri/Cargo.toml
        npm install
        cd src-tauri && cargo build --release && cd ..
        if [ ! -f "src-tauri/target/release/proton-drive" ]; then
          echo "Binary not found!"
          exit 1
        fi

        flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
        flatpak install --user -y flathub org.gnome.Platform//49 org.gnome.Sdk//49 || true

        printf '%s\n' '#!/bin/bash' \
          'export WEBKIT_DISABLE_DMABUF_RENDERER=1' \
          'export WEBKIT_DISABLE_COMPOSITING_MODE=1' \
          'export WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS=1' \
          'export GDK_GL=software' \
          'exec /app/bin/proton-drive-bin "$@"' \
          > proton-drive-wrapper.sh
        chmod +x proton-drive-wrapper.sh

        printf '%s\n' '[Desktop Entry]' \
          'Version=1.0' \
          'Type=Application' \
          'Name=Proton Drive' \
          'Comment=Secure cloud storage' \
          'Exec=proton-drive' \
          'Icon=com.proton.drive' \
          'Categories=Network;FileTransfer;' \
          > com.proton.drive.desktop

        rm -rf flatpak-staging
        mkdir -p flatpak-staging/icons
        cp src-tauri/target/release/proton-drive flatpak-staging/proton-drive-bin
        cp proton-drive-wrapper.sh flatpak-staging/proton-drive
        cp src-tauri/icons/32x32.png flatpak-staging/icons/
        cp src-tauri/icons/128x128.png flatpak-staging/icons/
        cp src-tauri/icons/128x128@2x.png flatpak-staging/icons/
        cp src-tauri/icons/proton-drive.svg flatpak-staging/icons/
        cp com.proton.drive.desktop flatpak-staging/
        cp packaging/com.proton.drive.metainfo.xml flatpak-staging/

        printf '%s\n' \
          'app-id: com.proton.drive' \
          'runtime: org.gnome.Platform' \
          "runtime-version: '49'" \
          'sdk: org.gnome.Sdk' \
          'command: proton-drive' \
          'finish-args:' \
          '  - --share=network' \
          '  - --share=ipc' \
          '  - --socket=fallback-x11' \
          '  - --socket=wayland' \
          '  - --socket=pulseaudio' \
          '  - --device=dri' \
          '  - --filesystem=xdg-download' \
          '  - --filesystem=xdg-documents' \
          '  - --talk-name=org.freedesktop.secrets' \
          '  - --talk-name=org.freedesktop.Notifications' \
          'modules:' \
          '- name: proton-drive' \
          '  buildsystem: simple' \
          '  sources:' \
          '  - type: dir' \
          '    path: flatpak-staging' \
          '  build-commands:' \
          '  - install -Dm755 proton-drive-bin /app/bin/proton-drive-bin' \
          '  - install -Dm755 proton-drive /app/bin/proton-drive' \
          '  - install -Dm644 icons/32x32.png /app/share/icons/hicolor/32x32/apps/com.proton.drive.png' \
          '  - install -Dm644 icons/128x128.png /app/share/icons/hicolor/128x128/apps/com.proton.drive.png' \
          '  - install -Dm644 icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/com.proton.drive.png' \
          '  - install -Dm644 icons/proton-drive.svg /app/share/icons/hicolor/scalable/apps/com.proton.drive.svg' \
          '  - install -Dm644 com.proton.drive.desktop /app/share/applications/com.proton.drive.desktop' \
          '  - install -Dm644 com.proton.drive.metainfo.xml /app/share/metainfo/com.proton.drive.metainfo.xml' \
          > com.proton.drive.yml

        rm -rf build-dir repo
        flatpak-builder --user --force-clean --repo=repo build-dir com.proton.drive.yml
        flatpak build-bundle repo "proton-drive_${VERSION}_gnome49.flatpak" com.proton.drive

    - name: Upload Flatpak artifact
      uses: actions/upload-artifact@v4
      with:
        name: flatpak-package-gnome49
        path: "*.flatpak"
        if-no-files-found: error
        retention-days: 30
