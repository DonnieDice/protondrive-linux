name: Build DEB

on:
  push:
    branches:
      - main
      - dev
      - alpha
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  RUST_VERSION: stable

jobs:
  build-deb:
    name: Debian Package
    runs-on: ubuntu-latest
    container:
      image: debian:12
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    steps:
      - name: Install Debian build dependencies
        shell: bash
        run: |
          apt-get update
          apt-get install -y \
            bash \
            git \
            curl \
            wget \
            build-essential \
            file \
            pkg-config \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf \
            nodejs \
            npm \
            python3 \
            ca-certificates \
            libvips-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev
          curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
          apt-get install -y nodejs

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "${RUST_VERSION}"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          . "$HOME/.cargo/env"
          rustc --version
          cargo --version

      - name: Clone WebClients
        run: |
          git clone --depth=1 --single-branch --branch main https://github.com/ProtonMail/WebClients.git WebClients

      - name: Build DEB
        run: |
          . "$HOME/.cargo/env"
          scripts/build-local-deb.sh

      - name: Normalize DEB filename
        run: |
          cd src-tauri/target/release/bundle/deb
          for file in *.deb; do
            if [ -f "$file" ]; then
              new_name="$(echo "$file" | sed 's/Proton\.Drive/proton-drive/g; s/Proton Drive/proton-drive/g')"
              if [ "$file" != "$new_name" ]; then
                mv "$file" "$new_name"
              fi
            fi
          done

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error
          retention-days: 30
