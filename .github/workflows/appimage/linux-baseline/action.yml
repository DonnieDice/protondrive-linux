name: build-appimage
description: Build the baseline Linux AppImage package.
runs:
  using: composite
  steps:
    - name: Install build dependencies
      shell: bash
      run: |
        apt-get update
        apt-get install -y \
        bash git curl wget build-essential file pkg-config \
        libssl-dev libwebkit2gtk-4.1-dev libgtk-3-dev \
        libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev \
        patchelf fuse libfuse2 python3 ca-certificates \
        libvips-dev libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev
        curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
        apt-get install -y nodejs

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust
      shell: bash
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "${RUST_VERSION}"
        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
        . "$HOME/.cargo/env"
        rustc --version
        cargo --version

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
        key: appimage-linux-baseline-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
        restore-keys: appimage-linux-baseline-cargo-

    - name: Clone WebClients
      shell: bash
      run: |
        git clone --depth=1 --single-branch --branch "${WEBCLIENTS_REF}" https://github.com/ProtonMail/WebClients.git WebClients

    - name: Apply distro patch
      shell: bash
      run: |
        APPIMAGE_TARGET="${{ github.event.inputs.appimage_target || 'linux-baseline' }}"
        PATCH_FILE="patches/appimage/${APPIMAGE_TARGET}.patch"
        if [ -f "$PATCH_FILE" ]; then
        git apply "$PATCH_FILE"
        echo "Applied $PATCH_FILE"
        else
        echo "ERROR: $PATCH_FILE not found"
        exit 1
        fi

    - name: Build WebClients
      shell: bash
      run: |
        . "$HOME/.cargo/env"
        scripts/build-webclients.sh

    - name: Build AppImage
      shell: bash
      run: |
        . "$HOME/.cargo/env"
        rm -rf src-tauri/target/release/bundle/appimage
        APPIMAGE_TARGET="${{ github.event.inputs.appimage_target || 'linux-baseline' }}"
        VERSION=$(node -p "require('./package.json').version")
        sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
        sed -i "0,/^version = \"[^\"]*\"/s//version = \"$VERSION\"/" src-tauri/Cargo.toml
        npm install
        cargo build --manifest-path src-tauri/Cargo.toml --release

        BINARY_PATH="src-tauri/target/release/proton-drive"
        APPDIR="AppDir"
        mkdir -p "$APPDIR/usr/bin"
        mkdir -p "$APPDIR/usr/share/applications"
        mkdir -p "$APPDIR/usr/share/icons/hicolor/scalable/apps"
        mkdir -p "$APPDIR/usr/share/icons/hicolor/128x128/apps"
        mkdir -p "$APPDIR/usr/share/icons/hicolor/32x32/apps"
        mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"

        cp "$BINARY_PATH" "$APPDIR/usr/bin/proton-drive"
        chmod +x "$APPDIR/usr/bin/proton-drive"

        cat > "$APPDIR/usr/share/applications/com.proton.drive.desktop" << 'EOF'
        [Desktop Entry]
        Version=1.0
        Type=Application
        Name=Proton Drive
        Comment=Secure cloud storage
        Exec=proton-drive %U
        Icon=com.proton.drive
        Categories=Utility;Network;FileTransfer;
        Keywords=proton;drive;cloud;storage;sync;
        Terminal=false
        StartupWMClass=proton-drive
        StartupNotify=true
        EOF

        cp src-tauri/icons/proton-drive.svg "$APPDIR/usr/share/icons/hicolor/scalable/apps/com.proton.drive.svg"
        cp src-tauri/icons/128x128.png "$APPDIR/usr/share/icons/hicolor/128x128/apps/com.proton.drive.png"
        cp src-tauri/icons/32x32.png "$APPDIR/usr/share/icons/hicolor/32x32/apps/com.proton.drive.png"
        cp src-tauri/icons/128x128@2x.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/com.proton.drive.png"
        cp "$APPDIR/usr/share/applications/com.proton.drive.desktop" "$APPDIR/com.proton.drive.desktop"
        cp src-tauri/icons/proton-drive.svg "$APPDIR/com.proton.drive.svg"
        ln -sf usr/share/icons/hicolor/128x128/apps/com.proton.drive.png "$APPDIR/.DirIcon"

        cat > "$APPDIR/AppRun" << 'APPRUN'
        #!/bin/bash
        export WEBKIT_DISABLE_DMABUF_RENDERER=1
        export WEBKIT_DISABLE_COMPOSITING_MODE=1
        export WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS=1
        export GDK_GL=software
        export GSK_RENDERER=cairo

        HERE="$(dirname "$(readlink -f "${0}")")"
        export PATH="${HERE}/usr/bin:${PATH}"
        export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
        exec "${HERE}/usr/bin/proton-drive" "$@"
        APPRUN
        chmod +x "$APPDIR/AppRun"

        wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
        chmod +x appimagetool
        ./appimagetool --appimage-extract
        ARCH=x86_64 ./squashfs-root/AppRun "$APPDIR" "proton-drive_${VERSION}_${APPIMAGE_TARGET}_amd64.AppImage"

        rm -rf src-tauri/target/release/bundle/appimage
        mkdir -p src-tauri/target/release/bundle/appimage
        mv "proton-drive_${VERSION}_${APPIMAGE_TARGET}_amd64.AppImage" src-tauri/target/release/bundle/appimage/

    - name: Write artifact manifest
      shell: bash
      run: |
        ARTIFACT_MANIFEST_DIR=src-tauri/target/release/bundle/appimage \
          bash scripts/ci/write-artifact-manifest.sh \
          appimage-linux-baseline \
          appimage \
          linux-baseline \
          x86_64 \
          "src-tauri/target/release/bundle/appimage/*.AppImage"

    - name: Upload AppImage artifact
      uses: actions/upload-artifact@v4
      with:
        name: appimage-linux-baseline
        path: |
          src-tauri/target/release/bundle/appimage/*.AppImage
          src-tauri/target/release/bundle/appimage/appimage-linux-baseline.*
        if-no-files-found: error
        retention-days: 30
