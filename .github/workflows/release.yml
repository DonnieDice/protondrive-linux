name: Create Release

"on":
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v1.2.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v$(node -p "require('./package.json').version")"
          fi
          echo "prerelease=false" >> "$GITHUB_OUTPUT"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Version: ${TAG}"

      - name: Create and push tag if needed
        run: |
          TAG="${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists on remote, skipping creation"
          else
            echo "Creating tag ${TAG}..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
            echo "Tag ${TAG} created and pushed"
          fi

      - name: Wait for all builds to complete
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            console.log(`Waiting for builds for SHA: ${sha}`);
            const expectedWorkflows = [
              'Build AppImage',
              'Build Flatpak',
              'Build Flatpak GNOME 49',
              'Build Snap',
              'Build Snap Core26',
              'Build AUR Arch Native',
              'Build DEB Debian 12',
              'Build DEB Debian 13',
              'Build DEB Ubuntu 24.04',
              'Build DEB Ubuntu 26.04',
              'Build RPM Fedora 43',
              'Build RPM Fedora 44',
              'Build RPM EL10',
              'Build RPM openSUSE Tumbleweed',
              'Build APK Alpine 3.20',
              'Build APK Alpine 3.22',
              'Build APK Alpine 3.23',
            ];
            await new Promise(resolve => setTimeout(resolve, 30000));
            const maxAttempts = 75;
            for (let i = 0; i < maxAttempts; i++) {
              const { data: { workflow_runs } } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head_sha: sha,
              });
              const buildWorkflows = workflow_runs.filter(r =>
                expectedWorkflows.includes(r.name) && r.status !== 'queued'
              );
              console.log(`Attempt ${i + 1}/${maxAttempts}: Found ${buildWorkflows.length}/${expectedWorkflows.length} workflows`);
              console.log(`Status: ${buildWorkflows.map(r => `${r.name}:${r.status}:${r.conclusion}`).join(', ')}`);
              if (buildWorkflows.length >= expectedWorkflows.length) {
                const allComplete = buildWorkflows.every(r => r.status === 'completed');
                if (allComplete) {
                  const allSuccess = buildWorkflows.every(r => r.conclusion === 'success');
                  if (allSuccess) {
                    console.log('All builds succeeded!');
                    return;
                  } else {
                    const failed = buildWorkflows.filter(r => r.conclusion !== 'success').map(r => r.name).join(', ');
                    throw new Error(`Some builds failed: ${failed}`);
                  }
                }
              }
              if (i < maxAttempts - 1) {
                await new Promise(resolve => setTimeout(resolve, 120000));
              }
            }
            throw new Error('Build workflows did not complete within 2.5 hours');

      - name: Download AppImage artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-appimage.yml
          name: appimage-linux-baseline
          path: artifacts/appimage
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download Flatpak artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-flatpak.yml
          name: flatpak-package
          path: artifacts/flatpak
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download Flatpak GNOME 49 artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-flatpak.gnome49.yml
          name: flatpak-package-gnome49
          path: artifacts/flatpak-gnome49
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download Snap artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-snap.yml
          name: snap-package
          path: artifacts/snap
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download AUR artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-aur.yml
          name: aur-arch-native
          path: artifacts/aur
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download DEB Debian 12 artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-deb.yml
          name: deb-package-debian12
          path: artifacts/deb-debian12
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download RPM Fedora 43 artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-rpm.fedora.43.yml
          name: rpm-package-fedora43
          path: artifacts/rpm-fedora43
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download RPM Fedora 44 artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-rpm.fedora.44.yml
          name: rpm-package-fedora44
          path: artifacts/rpm-fedora44
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download DEB Debian 13 artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-deb.debian.13.yml
          name: deb-package-debian13
          path: artifacts/deb-debian13
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download DEB Ubuntu 24.04 artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-deb.ubuntu.24.04.yml
          name: deb-package-ubuntu2404
          path: artifacts/deb-ubuntu2404
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download DEB Ubuntu 26.04 artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-deb.ubuntu.26.04.yml
          name: deb-package-ubuntu2604
          path: artifacts/deb-ubuntu2604
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download RPM EL10 artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-rpm.el10.yml
          name: rpm-package-el10
          path: artifacts/rpm-el10
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download RPM openSUSE Tumbleweed artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-rpm.opensuse.tumbleweed.yml
          name: rpm-package-opensuse-tumbleweed
          path: artifacts/rpm-opensuse-tumbleweed
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download Snap Core26 artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-snap.core26.yml
          name: snap-package-core26
          path: artifacts/snap-core26
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download APK Alpine 3.20 artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-apk.alpine.3.20.yml
          name: apk-package-alpine320
          path: artifacts/apk-alpine320
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download APK Alpine 3.22 artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-apk.alpine.3.22.yml
          name: apk-package-alpine322
          path: artifacts/apk-alpine322
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download APK Alpine 3.23 artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-apk.alpine.3.23.yml
          name: apk-package-alpine323
          path: artifacts/apk-alpine323
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Prepare release files
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p release
          find artifacts/ -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.flatpak" -o -name "*.snap" -o -name "*.pkg.tar.zst" -o -name "*.apk.tar.gz" \) -print0 | while IFS= read -r -d '' src; do
            rel="${src#artifacts/}"
            name="$(basename "$src")"
            case "$name" in
              proton-drive*_${VERSION}_*|proton-drive*_${VERSION}.*|proton-drive*-${VERSION}-*)
                ;;
              *)
                echo "Skipping stale artifact: $name"
                continue
                ;;
            esac
            case "$rel" in
              rpm-fedora43/*)
                dest="release/${name%.rpm}-fedora43.rpm"
                ;;
              rpm-fedora44/*)
                dest="release/${name%.rpm}-fedora44.rpm"
                ;;
              rpm-el10/*)
                dest="release/${name%.rpm}-el10.rpm"
                ;;
              rpm-opensuse-tumbleweed/*)
                dest="release/${name%.rpm}-opensuse-tumbleweed.rpm"
                ;;
              apk-alpine320/*)
                dest="release/${name}"
                ;;
              apk-alpine322/*)
                dest="release/${name}"
                ;;
              apk-alpine323/*)
                dest="release/${name}"
                ;;
              *)
                dest="release/${name}"
                ;;
            esac
            cp "$src" "$dest"
          done
          cd release
          sha256sum * > SHA256SUMS
          echo "Release artifacts:"
          ls -lah
          cd ..

      - name: Create release notes
        run: |
          RELEASE_DATE=$(date -u +'%Y-%m-%d')
          VERSION=${{ steps.version.outputs.version }}

          cat > RELEASE_NOTES.md << EOF
          # Proton Drive Linux ${VERSION}

          **Release Date:** ${RELEASE_DATE}

          An unofficial Linux desktop client for Proton Drive, built with Tauri.

          ## Downloads

          | Format | File | Description |
          |--------|------|-------------|
          | AppImage | \`proton-drive_*.AppImage\` | Universal Linux (portable, glibc 2.35+) |
          | Flatpak (GNOME 50) | \`proton-drive_*_gnome50.flatpak\` | Flatpak sandbox (org.gnome.Platform//50) |
          | Flatpak (GNOME 49) | \`proton-drive_*_gnome49.flatpak\` | Flatpak sandbox (org.gnome.Platform//49) |
          | Snap (core24) | \`proton-drive_*_core24_amd64.snap\` | Snap package (core24 runtime) |
          | Snap (core26) | \`proton-drive_*_core26_amd64.snap\` | Snap package (core26 runtime) |
          | AUR | \`proton-drive-*.pkg.tar.zst\` | Arch Linux / Manjaro / EndeavourOS / Garuda |
          | DEB (Ubuntu 24.04) | \`proton-drive_*_ubuntu24.04_amd64.deb\` | Ubuntu 24.04 LTS (Noble) |
          | DEB (Ubuntu 26.04) | \`proton-drive_*_ubuntu26.04_amd64.deb\` | Ubuntu 26.04 LTS |
          | DEB (Debian 12) | \`proton-drive_*_debian12_amd64.deb\` | Debian 12 (Bookworm) |
          | DEB (Debian 13) | \`proton-drive_*_debian13_amd64.deb\` | Debian 13 (Trixie) |
          | RPM (Fedora 43) | \`proton-drive-*-fedora43.rpm\` | Fedora 43+ |
          | RPM (Fedora 44) | \`proton-drive-*-fedora44.rpm\` | Fedora 44+ |
          | RPM (EL10) | \`proton-drive-*-el10.rpm\` | RHEL 10 / Alma 10 / CentOS Stream 10 |
          | RPM (openSUSE Tumbleweed) | \`proton-drive-*-opensuse-tumbleweed.rpm\` | openSUSE Tumbleweed (rolling) |
          | APK (Alpine 3.20) | \`proton-drive_*_alpine320_amd64.apk.tar.gz\` | Alpine 3.20 (musl) |
          | APK (Alpine 3.22) | \`proton-drive_*_alpine322_amd64.apk.tar.gz\` | Alpine 3.22 (musl) |
          | APK (Alpine 3.23) | \`proton-drive_*_alpine323_amd64.apk.tar.gz\` | Alpine 3.23 (musl) |

          ## Installation

          ### AppImage (Portable)
          \`\`\`bash
          chmod +x proton-drive_*.AppImage
          ./proton-drive_*.AppImage
          \`\`\`

          ### Flatpak
          \`\`\`bash
          flatpak install proton-drive_*.flatpak
          \`\`\`

          ### Snap
          \`\`\`bash
          sudo snap install proton-drive_*.snap --dangerous
          \`\`\`

          ### Arch Linux (AUR)
          \`\`\`bash
          sudo pacman -U proton-drive-*.pkg.tar.zst
          \`\`\`

          ### Debian/Ubuntu
          \`\`\`bash
          sudo apt install ./proton-drive_*.deb
          \`\`\`

          ### Fedora/RHEL
          \`\`\`bash
          sudo dnf install ./proton-drive-*.rpm
          \`\`\`

          ### openSUSE Tumbleweed
          \`\`\`bash
          sudo zypper install ./proton-drive-*-opensuse-tumbleweed.rpm
          \`\`\`

          ### Alpine 3.20
          \`\`\`bash
          sudo apk add ./proton-drive_*_alpine320_amd64.apk.tar.gz
          \`\`\`

          ### Alpine 3.22
          \`\`\`bash
          sudo apk add ./proton-drive_*_alpine322_amd64.apk.tar.gz
          \`\`\`

          ### Alpine 3.23
          \`\`\`bash
          sudo apk add ./proton-drive_*_alpine323_amd64.apk.tar.gz
          \`\`\`

          ## Checksums

          All files have SHA256 checksums available in \`SHA256SUMS\`.

          ## System Requirements

          - Linux x86_64
          - GTK 3.0+ and WebKitGTK
          - ~200MB disk space

          ## Issues

          Report issues at https://github.com/${{ github.repository }}/issues
          EOF

      - name: Delete stale release assets
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${{ steps.version.outputs.version }}"
          EXISTING=$(gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Cleaning existing assets before upload..."
            echo "$EXISTING" | while read -r name; do
              [ -z "$name" ] && continue
              echo "  Deleting $name"
              gh release delete-asset "$TAG" "$name" --yes || true
            done
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: release/*
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
