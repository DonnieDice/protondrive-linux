name: Create Release

"on":
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v1.2.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v$(node -p "require('./package.json').version")"
          fi
          echo "prerelease=false" >> "$GITHUB_OUTPUT"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Version: ${TAG}"

      - name: Create and push tag if needed
        run: |
          TAG="${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists on remote, skipping creation"
          else
            echo "Creating tag ${TAG}..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
            echo "Tag ${TAG} created and pushed"
          fi

      - name: Wait for all builds to complete
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            console.log(`Waiting for builds for SHA: ${sha}`);

            const expectedWorkflows = [
              'Build AppImage',
              'Build Flatpak',
              'Build Snap',
              'Build Snap Core26',
              'Build AUR',
              'Build DEB',
              'Build DEB Debian 13',
              'Build DEB Ubuntu 22.04',
              'Build DEB Ubuntu 26.04',
              'Build RPM Fedora 43',
              'Build RPM Fedora 44',
              'Build RPM EL9',
              'Build RPM EL10',
            ];

            await new Promise(resolve => setTimeout(resolve, 30000));

            const maxAttempts = 75;
            for (let i = 0; i < maxAttempts; i++) {
              const { data: { workflow_runs } } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head_sha: sha,
              });

              const buildWorkflows = workflow_runs.filter(r =>
                expectedWorkflows.includes(r.name) && r.status !== 'queued'
              );

              console.log(`Attempt ${i + 1}/${maxAttempts}: Found ${buildWorkflows.length}/${expectedWorkflows.length} workflows`);
              console.log(`Status: ${buildWorkflows.map(r => `${r.name}:${r.status}:${r.conclusion}`).join(', ')}`);

              if (buildWorkflows.length >= expectedWorkflows.length) {
                const allComplete = buildWorkflows.every(r => r.status === 'completed');
                if (allComplete) {
                  const allSuccess = buildWorkflows.every(r => r.conclusion === 'success');
                  if (allSuccess) {
                    console.log('All builds succeeded!');
                    return;
                  } else {
                    const failed = buildWorkflows.filter(r => r.conclusion !== 'success').map(r => r.name).join(', ');
                    throw new Error(`Some builds failed: ${failed}`);
                  }
                }
              }

              if (i < maxAttempts - 1) {
                await new Promise(resolve => setTimeout(resolve, 120000));
              }
            }

            throw new Error('Build workflows did not complete within 2.5 hours');

      - name: Download AppImage artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-appimage.yml
          name: appimage-linux-baseline
          path: artifacts/appimage
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download Flatpak artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-flatpak.yml
          name: flatpak-package
          path: artifacts/flatpak
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download Snap artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-snap.yml
          name: snap-package
          path: artifacts/snap
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download AUR artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-aur.yml
          name: aur-arch
          path: artifacts/aur
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download DEB artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-deb.yml
          name: deb-package
          path: artifacts/deb
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download RPM Fedora 43 artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-rpm.fedora.43.yml
          name: rpm-package-fedora43
          path: artifacts/rpm-fedora43
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download RPM Fedora 44 artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-rpm.fedora.44.yml
          name: rpm-package-fedora44
          path: artifacts/rpm-fedora44
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download DEB Debian 13 artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-deb.debian.13.yml
          name: deb-package-debian13
          path: artifacts/deb-debian13
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download DEB Ubuntu 22.04 artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-deb.ubuntu.22.04.yml
          name: deb-package-ubuntu2204
          path: artifacts/deb-ubuntu2204
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download DEB Ubuntu 26.04 artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-deb.ubuntu.26.04.yml
          name: deb-package-ubuntu2604
          path: artifacts/deb-ubuntu2604
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download RPM EL9 artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-rpm.el9.yml
          name: rpm-package-el9
          path: artifacts/rpm-el9
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download RPM EL10 artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-rpm.el10.yml
          name: rpm-package-el10
          path: artifacts/rpm-el10
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download Snap Core26 artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-snap.core26.yml
          name: snap-package-core26
          path: artifacts/snap-core26
          commit: ${{ github.sha }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts/ -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.flatpak" -o -name "*.snap" -o -name "*.pkg.tar.zst" \) -exec cp {} release/ \;
          cd release
          sha256sum * > SHA256SUMS
          echo "Release artifacts:"
          ls -lah
          cd ..

      - name: Create release notes
        run: |
          RELEASE_DATE=$(date -u +'%Y-%m-%d')
          VERSION=${{ steps.version.outputs.version }}

          cat > RELEASE_NOTES.md << EOF
          # Proton Drive Linux ${VERSION}

          **Release Date:** ${RELEASE_DATE}

          An unofficial Linux desktop client for Proton Drive, built with Tauri.

          ## Downloads

          | Format | File | Description |
          |--------|------|-------------|
          | AppImage | \`proton-drive_*.AppImage\` | Universal Linux (portable, glibc 2.35+) |
          | Flatpak | \`proton-drive_*.flatpak\` | Flatpak sandbox (org.gnome.Platform//50) |
          | Snap (core24) | \`proton-drive_*_amd64.snap\` | Snap package (core24 runtime) |
          | Snap (core26) | \`proton-drive_*_amd64.snap\` | Snap package (core26 runtime) |
          | AUR | \`proton-drive-*.pkg.tar.zst\` | Arch Linux / Manjaro / EndeavourOS / Garuda |
          | DEB (Ubuntu 22.04) | \`proton-drive_*_amd64.deb\` | Ubuntu 22.04 LTS (Jammy) |
          | DEB (Ubuntu 24.04) | \`proton-drive_*_amd64.deb\` | Ubuntu 24.04 LTS (Noble) |
          | DEB (Ubuntu 26.04) | \`proton-drive_*_amd64.deb\` | Ubuntu 26.04 LTS |
          | DEB (Debian 12) | \`proton-drive_*_amd64.deb\` | Debian 12 (Bookworm) |
          | DEB (Debian 13) | \`proton-drive_*_amd64.deb\` | Debian 13 (Trixie) |
          | RPM (Fedora 43) | \`proton-drive-*.rpm\` | Fedora 43+ |
          | RPM (Fedora 44) | \`proton-drive-*.rpm\` | Fedora 44+ |
          | RPM (EL9) | \`proton-drive-*.rpm\` | RHEL 9 / Alma 9 / Rocky 9 |
          | RPM (EL10) | \`proton-drive-*.rpm\` | RHEL 10 / Alma 10 / CentOS Stream 10 |

          ## Installation

          ### AppImage (Portable)
          \`\`\`bash
          chmod +x proton-drive_*.AppImage
          ./proton-drive_*.AppImage
          \`\`\`

          ### Flatpak
          \`\`\`bash
          flatpak install proton-drive_*.flatpak
          \`\`\`

          ### Snap
          \`\`\`bash
          sudo snap install proton-drive_*.snap --dangerous
          \`\`\`

          ### Arch Linux (AUR)
          \`\`\`bash
          sudo pacman -U proton-drive-*.pkg.tar.zst
          \`\`\`

          ### Debian/Ubuntu
          \`\`\`bash
          sudo apt install ./proton-drive_*.deb
          \`\`\`

          ### Fedora/RHEL
          \`\`\`bash
          sudo dnf install ./proton-drive-*.rpm
          \`\`\`

          ## Checksums

          All files have SHA256 checksums available in \`SHA256SUMS\`.

          ## System Requirements

          - Linux x86_64
          - GTK 3.0+ and WebKitGTK
          - ~200MB disk space

          ## Issues

          Report issues at https://github.com/${{ github.repository }}/issues
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: release/*
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
