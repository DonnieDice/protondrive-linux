name: Build Flatpak

on:
  push:
    branches:
      - main
      - dev
      - alpha
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  RUST_VERSION: stable
  DISTRO_TYPE: flatpak

jobs:
  build-flatpak:
    name: Flatpak Package
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    steps:
      - name: Install Flatpak build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bash \
            git \
            curl \
            wget \
            build-essential \
            file \
            pkg-config \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf \
            nodejs \
            npm \
            python3 \
            ca-certificates \
            libvips-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            flatpak \
            flatpak-builder
          curl -fsSL https://deb.nodesource.com/setup_22.x | sudo bash -
          sudo apt-get install -y nodejs

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "${RUST_VERSION}"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          . "$HOME/.cargo/env"
          rustc --version
          cargo --version

      - name: Clone WebClients
        run: |
          git clone --depth=1 --single-branch --branch main https://github.com/ProtonMail/WebClients.git WebClients

      - name: Apply Flatpak/GNOME distro patch
        run: |
          if [ -f patches/flatpak/gnome.patch ]; then
            git apply patches/flatpak/gnome.patch
            echo "Applied patches/flatpak/gnome.patch"
          fi

      - name: Build Flatpak
        run: |
          . "$HOME/.cargo/env"
          scripts/build-local-flatpak.sh

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-package
          path: "*.flatpak"
          if-no-files-found: error
          retention-days: 30
