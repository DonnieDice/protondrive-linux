name: Build APK Alpine 3.20

"on":
  push:
    branches:
    - main
    - dev
    - alpha
    tags:
    - "v*"
  workflow_dispatch:
    inputs:
      distro_patch:
        description: "Distro patch name (e.g. alpine.3.20)"
        required: false
        default: "alpine.3.20"

permissions:
  contents: read

env:
  RUST_VERSION: stable
  DISTRO_TYPE: apk
  DISTRO_PATCH: ${{ github.event.inputs.distro_patch || 'alpine.3.20' }}
  DISTRO_SUFFIX: alpine320

jobs:
  build-apk:
    name: Alpine 3.20 APK
    runs-on: ubuntu-latest
    container:
      image: alpine:3.20
    timeout-minutes: 120
    defaults:
      run:
        shell: /bin/sh -e {0}

    steps:
    - name: Install build dependencies
      run: |
        apk update
        apk add \
          bash git curl wget build-base file pkgconfig \
          openssl-dev openssl-libs-static \
          webkit2gtk-4.1-dev gtk+3.0-dev \
          glib-dev gdk-pixbuf-dev harfbuzz-dev \
          pango-dev cairo-dev \
          wayland-dev zlib-dev libintl musl-dev \
          libsoup3-dev libayatana-appindicator-dev \
          patchelf nodejs npm \
          python3 ca-certificates \
          vips-dev libjpeg-turbo-dev giflib-dev

    - name: Debug - list installed .so symlinks
      run: |
        echo "=== /usr/lib .so files (no version) ==="
        find /usr/lib -maxdepth 1 -name '*.so' -type l -o -name '*.so' -type f 2>/dev/null || true
        echo "=== /usr/lib .so.* count ==="
        ls /usr/lib/*.so.* 2>/dev/null | wc -l
        echo "=== key libs ==="
        for f in libglib-2.0 libcairo libharfbuzz libgio-2.0 libgobject-2.0 libpango-1.0 libgdk_pixbuf-2.0 libfontconfig libfreetype libepoxy; do
          echo "--- $f ---"
          ls -la /usr/lib/${f}.so* 2>&1 || true
        done

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust via rustup
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "${RUST_VERSION}"
        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
        . "$HOME/.cargo/env"
        rustc --version
        cargo --version

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          src-tauri/target/
        key: apk-alpine320-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
        restore-keys: apk-alpine320-cargo-

    - name: Clone WebClients
      run: |
        git clone --depth=1 --single-branch --branch main https://github.com/ProtonMail/WebClients.git WebClients

    - name: Apply distro patch
      run: |
        PATCH_FILE="patches/apk/${DISTRO_PATCH}.patch"
        if [ -f "$PATCH_FILE" ]; then
          if git apply --reverse --check "$PATCH_FILE" 2>/dev/null; then
            echo "Patch already applied: $PATCH_FILE"
          else
            git apply --check "$PATCH_FILE"
            git apply "$PATCH_FILE"
            echo "Applied $PATCH_FILE"
          fi
        else
          echo "WARNING: $PATCH_FILE not found, building without distro patch"
        fi

    - name: Create .so symlinks for musl linking
      run: |
        cd /usr/lib
        for lib in libglib-2.0 libgobject-2.0 libgio-2.0 libgdk_pixbuf-2.0 \
                   libcairo libcairo-gobject libpango-1.0 libpangocairo-1.0 \
                   libharfbuzz libatk-1.0 libgdk-3 libwayland-client \
                   libfontconfig libfreetype libepoxy libXi libX11 libXcomposite \
                   libXdamage libXfixes libXrandr libatk-bridge-2.0 libdbus-1 \
                   libatspi libgtk-3 libjavascriptcoregtk-4.1 libwebkit2gtk-4.1; do
          if [ -L "${lib}.so" ] || [ -e "${lib}.so" ]; then
            echo "OK: ${lib}.so already exists"
            continue
          fi
          candidate=$(ls -1 ${lib}.so.* 2>/dev/null | head -1)
          if [ -n "$candidate" ]; then
            ln -sf "$candidate" "${lib}.so"
            echo "Linked ${lib}.so -> $candidate"
          else
            echo "WARN: no ${lib}.so.* found"
          fi
        done
        echo "--- Verify key symlinks ---"
        ls -la /usr/lib/libglib-2.0.so /usr/lib/libcairo.so /usr/lib/libharfbuzz.so /usr/lib/libgio-2.0.so /usr/lib/libpango-1.0.so 2>&1 || true

    - name: Debug - show linker search paths
      run: |
        ld_path=/usr/lib/gcc/x86_64-alpine-linux-musl/*/ld
        if [ -x "$ld_path" ]; then
          $ld_path -m elf_x86_64 --verbose 2>&1 | grep SEARCH_DIR || true
        else
          echo "ld not found at $ld_path"
          find /usr -name 'ld' -o -name 'ld.bfd' -o -name 'ld.lld' 2>/dev/null
        fi
        echo "=== gcc -print-search-dirs ==="
        gcc -print-search-dirs 2>/dev/null || true
        echo "=== pkg-config checks ==="
        pkg-config --libs glib-2.0 gio-2.0 cairo harfbuzz pango 2>/dev/null || true
        echo "=== verify linker can find libs ==="
        echo 'int main(){return 0;}' | gcc -x c - -lglib-2.0 -o /dev/null 2>&1 || echo "FAILED: gcc -lglib-2.0"

    - name: Build APK
      run: |
        if [ -f "$HOME/.cargo/env" ]; then . "$HOME/.cargo/env"; fi
        export PKG_CONFIG_ALLOW_CROSS=1
        export PKG_CONFIG_PATH="/usr/lib/pkgconfig:/usr/share/pkgconfig"
        export LIBRARY_PATH="/usr/lib:${LIBRARY_PATH:-}"
        export RUSTFLAGS="-C link-arg=-L/usr/lib -C link-arg=-Wl,--as-needed"
        echo "RUSTFLAGS=$RUSTFLAGS"
        scripts/build-webclients.sh
        VERSION=$(node -p "require('./package.json').version")
        sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
        sed -i "0,/^version = \"[^\"]*\"/s//version = \"$VERSION\"/" src-tauri/Cargo.toml
        npm install
        npx tauri build --verbose

    - name: Package APK
      run: |
        VERSION=$(node -p "require('./package.json').version")
        ARCH=x86_64
        BINARY=src-tauri/target/release/proton-drive
        if [ ! -f "$BINARY" ]; then
          echo "ERROR: binary not found at $BINARY"
          exit 1
        fi
        APK_STAGING="/tmp/proton-drive-apk"
        rm -rf "$APK_STAGING"
        mkdir -p "$APK_STAGING/usr/bin"
        mkdir -p "$APK_STAGING/usr/share/applications"
        mkdir -p "$APK_STAGING/usr/share/icons/hicolor/32x32/apps"
        mkdir -p "$APK_STAGING/usr/share/icons/hicolor/128x128/apps"
        mkdir -p "$APK_STAGING/usr/share/icons/hicolor/128x128@2/apps"
        mkdir -p "$APK_STAGING/usr/share/icons/hicolor/scalable/apps"
        mkdir -p "$APK_STAGING/APKBUILD"

        cp "$BINARY" "$APK_STAGING/usr/bin/proton-drive"
        strip "$APK_STAGING/usr/bin/proton-drive" 2>/dev/null || true
        cp src-tauri/linux/proton-drive.desktop "$APK_STAGING/usr/share/applications/"
        cp src-tauri/icons/32x32.png "$APK_STAGING/usr/share/icons/hicolor/32x32/apps/proton-drive.png"
        cp src-tauri/icons/128x128.png "$APK_STAGING/usr/share/icons/hicolor/128x128/apps/proton-drive.png"
        cp src-tauri/icons/128x128@2x.png "$APK_STAGING/usr/share/icons/hicolor/128x128@2/apps/proton-drive.png"
        cp src-tauri/icons/proton-drive.svg "$APK_STAGING/usr/share/icons/hicolor/scalable/apps/proton-drive.svg"

        cat > "$APK_STAGING/APKBUILD" <<EOF
        pkgname=proton-drive
        pkgver=${VERSION}
        pkgrel=0
        pkgdesc="Proton Drive desktop client"
        url="https://github.com/DonnieDice/protondrive-linux"
        arch="x86_64"
        license="AGPL-3.0"
        depends="webkit2gtk-4.1 gtk+3.0"
        options="!check"
        package() {
          install -Dm755 usr/bin/proton-drive "\$pkgdir"/usr/bin/proton-drive
          install -Dm644 usr/share/applications/proton-drive.desktop "\$pkgdir"/usr/share/applications/proton-drive.desktop
          install -Dm644 usr/share/icons/hicolor/32x32/apps/proton-drive.png "\$pkgdir"/usr/share/icons/hicolor/32x32/apps/proton-drive.png
          install -Dm644 usr/share/icons/hicolor/128x128/apps/proton-drive.png "\$pkgdir"/usr/share/icons/hicolor/128x128/apps/proton-drive.png
          install -Dm644 usr/share/icons/hicolor/128x128@2/apps/proton-drive.png "\$pkgdir"/usr/share/icons/hicolor/128x128@2/apps/proton-drive.png
          install -Dm644 usr/share/icons/hicolor/scalable/apps/proton-drive.svg "\$pkgdir"/usr/share/icons/hicolor/scalable/apps/proton-drive.svg
        }
        EOF

        ARTIFACT_DIR="/tmp/apk-artifact"
        rm -rf "$ARTIFACT_DIR"
        mkdir -p "$ARTIFACT_DIR"
        tar -C "$APK_STAGING" -czf "$ARTIFACT_DIR/proton-drive_${VERSION}_${DISTRO_SUFFIX}_amd64.apk.tar.gz" .
        echo "Packaged: $ARTIFACT_DIR/proton-drive_${VERSION}_${DISTRO_SUFFIX}_amd64.apk.tar.gz"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: apk-package-alpine320
        path: /tmp/apk-artifact/proton-drive_*_alpine320_amd64.apk.tar.gz
        if-no-files-found: error
        retention-days: 30
