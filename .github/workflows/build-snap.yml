name: Build Snap

on:
  push:
    branches:
      - main
      - dev
      - alpha
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  RUST_VERSION: stable
  DISTRO_TYPE: snap

jobs:
  build-snap:
    name: Snap Package
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    steps:
      - name: Install Snap build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bash \
            git \
            curl \
            wget \
            build-essential \
            file \
            pkg-config \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf \
            nodejs \
            npm \
            python3 \
            ca-certificates \
            libvips-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            snapcraft
          curl -fsSL https://deb.nodesource.com/setup_22.x | sudo bash -
          sudo apt-get install -y nodejs

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "${RUST_VERSION}"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          . "$HOME/.cargo/env"
          rustc --version
          cargo --version

      - name: Clone WebClients
        run: |
          git clone --depth=1 --single-branch --branch main https://github.com/ProtonMail/WebClients.git WebClients

- name: Apply Snap distro patch
      run: |
        if [ -f patches/snap/${{ vars.DISTRO_PATCH || 'ubuntu.24.04' }}.patch ]; then
          git apply patches/snap/${{ vars.DISTRO_PATCH || 'ubuntu.24.04' }}.patch
          echo "Applied patches/snap/${{ vars.DISTRO_PATCH || 'ubuntu.24.04' }}.patch"
        fi

      - name: Build Snap
        run: |
          . "$HOME/.cargo/env"
          scripts/build-local-snap.sh

      - name: Upload Snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: snap-package
          path: "*.snap"
          if-no-files-found: error
          retention-days: 30
