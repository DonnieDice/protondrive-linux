name: Build Snap

"on":
  push:
    branches:
    - main
    - dev
    - alpha
    tags:
    - "v*"
  workflow_dispatch:
    inputs:
    distro_patch:
      description: "Snap base patch name (e.g. core24)"
      required: false
      default: core24

permissions:
  contents: read

env:
  RUST_VERSION: stable
  DISTRO_TYPE: snap

jobs:
  build-snap:
    name: Snap Package
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    steps:
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bash git curl wget build-essential file pkg-config \
          libssl-dev libwebkit2gtk-4.1-dev libgtk-3-dev \
          libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev \
          patchelf python3 ca-certificates \
          libvips-dev libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev \
          snapcraft
        curl -fsSL https://deb.nodesource.com/setup_22.x | sudo bash -
        sudo apt-get install -y nodejs

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "${RUST_VERSION}"
        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
        . "$HOME/.cargo/env"
        rustc --version
        cargo --version

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          src-tauri/target/
        key: snap-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
        restore-keys: snap-cargo-

    - name: Clone WebClients
      run: |
        git clone --depth=1 --single-branch --branch main https://github.com/ProtonMail/WebClients.git WebClients

    - name: Apply distro patch
      run: |
        DISTRO_PATCH="${{ github.event.inputs.distro_patch || 'core24' }}"
        PATCH_FILE="patches/snap/${DISTRO_PATCH}.patch"
        if [ -f "$PATCH_FILE" ]; then
          git apply "$PATCH_FILE"
          echo "Applied $PATCH_FILE"
        else
          echo "WARNING: $PATCH_FILE not found, building without distro patch"
        fi

    - name: Build Snap
      run: |
        . "$HOME/.cargo/env"
        scripts/build-webclients.sh
        VERSION=$(node -p "require('./package.json').version")
        sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
        sed -i "0,/^version = \"[^\"]*\"/s//version = \"$VERSION\"/" src-tauri/Cargo.toml
        npm install
        cd src-tauri && cargo build --release && cd ..
        if [ ! -f "src-tauri/target/release/proton-drive" ]; then
          echo "Binary not found!"
          exit 1
        fi

        mkdir -p snap
        cat > snap/snapcraft.yaml << EOF
        name: proton-drive
        version: "${VERSION}"
        summary: Proton Drive Linux Desktop Client
        description: |
          Fast, lightweight, and unofficial desktop GUI client for Proton Drive on Linux.
          Built with Tauri and Rust for a native-performance experience.
        grade: stable
        confinement: strict
        base: core24
        platforms:
          amd64:

        apps:
          proton-drive:
            command: usr/bin/proton-drive-wrapper
            environment:
              WEBKIT_DISABLE_DMABUF_RENDERER: "1"
              WEBKIT_DISABLE_COMPOSITING_MODE: "1"
              GDK_GL: software
            desktop: usr/share/applications/com.proton.drive.desktop
            plugs:
            - home
            - network
            - network-bind
            - network-status
            - desktop
            - desktop-legacy
            - x11
            - wayland
            - opengl
            - audio-playback
            - browser-support
            - password-manager-service
            - dbus

        plugs:
          dbus:
            interface: dbus
            bus: session
            name: com.proton.drive

        parts:
          proton-drive:
            plugin: nil
            source: .
            override-build: |
              install -Dm755 src-tauri/target/release/proton-drive "\$SNAPCRAFT_PART_INSTALL/usr/bin/proton-drive"
              mkdir -p "\$SNAPCRAFT_PART_INSTALL/usr/bin"
              cat > "\$SNAPCRAFT_PART_INSTALL/usr/bin/proton-drive-wrapper" << 'WRAPPEREOF'
        #!/bin/bash
        export WEBKIT_DISABLE_DMABUF_RENDERER=1
        export WEBKIT_DISABLE_COMPOSITING_MODE=1
        export GDK_GL=software
        exec "\$SNAP/usr/bin/proton-drive" "\$@"
        WRAPPEREOF
              chmod +x "\$SNAPCRAFT_PART_INSTALL/usr/bin/proton-drive-wrapper"
              mkdir -p "\$SNAPCRAFT_PART_INSTALL/usr/share/applications"
              cat > "\$SNAPCRAFT_PART_INSTALL/usr/share/applications/com.proton.drive.desktop" << 'DESKTOPEOF'
        [Desktop Entry]
        Version=1.0
        Type=Application
        Name=Proton Drive
        Comment=Secure cloud storage
        Exec=proton-drive-wrapper
        Icon=com.proton.drive
        Categories=Utility;
        DESKTOPEOF
              mkdir -p "\$SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/32x32/apps"
              mkdir -p "\$SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/128x128/apps"
              mkdir -p "\$SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/scalable/apps"
              cp src-tauri/icons/32x32.png "\$SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/32x32/apps/com.proton.drive.png"
              cp src-tauri/icons/128x128.png "\$SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/128x128/apps/com.proton.drive.png"
              cp src-tauri/icons/proton-drive.svg "\$SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/scalable/apps/com.proton.drive.svg"
            stage-packages:
            - libssl3
            - libwebkit2gtk-4.1-0
            - libgtk-3-0
            - libayatana-appindicator3-1
            - librsvg2-2
            - libsoup-3.0-0
        EOF

        snapcraft --destructive-mode

    - name: Upload Snap artifact
      uses: actions/upload-artifact@v4
      with:
        name: snap-package
        path: "*.snap"
        if-no-files-found: error
        retention-days: 30
