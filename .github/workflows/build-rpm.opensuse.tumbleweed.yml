name: Build RPM openSUSE Tumbleweed

"on":
  push:
    branches:
      - main
      - alpha
      - "feature/**"
      - "fix/**"
      - "chore/**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      distro_patch:
        description: "Distro patch name (e.g. opensuse.tumbleweed)"
        required: false
        default: "opensuse.tumbleweed"

permissions:
  contents: read

env:
  RUST_VERSION: stable
  DISTRO_TYPE: rpm
  WEBCLIENTS_REF: main

jobs:
  build-rpm:
    name: openSUSE Tumbleweed RPM
    runs-on: ubuntu-latest
    container:
      image: opensuse/tumbleweed:latest
      options: --user root
      env:
        PATH: /usr/local/bin:/usr/bin:/bin
    timeout-minutes: 120
    defaults:
      run:
        shell: /bin/bash -e -o pipefail {0}

    steps:
  - name: Install build dependencies
    shell: /bin/sh -e {0}
    run: |
      retry_cmd() {
        max=${1:-3}; shift
        attempt=1
        until "$@"; do
          if [ $attempt -ge $max ]; then
            echo "Command failed after $attempt attempts: $*" >&2
            return 1
          fi
          echo "Command failed, retrying ($attempt/$max): $*"
          sleep $((attempt * 10))
          attempt=$((attempt + 1))
        done
        return 0
      }

      retry_cmd 5 zypper --non-interactive --gpg-auto-import-keys refresh
      retry_cmd 3 zypper --non-interactive install \
        bash git curl wget gcc gcc-c++ make file pkgconf-pkg-config \
        libopenssl-devel gtk3-devel \
        libappindicator3-devel libayatana-appindicator3-devel \
        librsvg-devel libsoup-devel \
        webkitgtk3-devel libwebkit2gtk-4_1-0 \
        patchelf rpm-build nodejs-default npm-default python313 findutils which
      echo "/usr/local/bin:/usr/bin:/bin" >> "$GITHUB_PATH"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "${RUST_VERSION}"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          . "$HOME/.cargo/env"
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: rpm-opensuse-tumbleweed-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rpm-opensuse-tumbleweed-cargo-

      - name: Clone WebClients
        run: |
          git clone --depth=1 --single-branch --branch "${WEBCLIENTS_REF}" https://github.com/ProtonMail/WebClients.git WebClients

      - name: Apply distro patch
        run: |
          DISTRO_PATCH="${{ github.event.inputs.distro_patch || 'opensuse.tumbleweed' }}"
          PATCH_FILE="patches/rpm/${DISTRO_PATCH}.patch"
          if [ -f "$PATCH_FILE" ]; then
            if git apply --reverse --check "$PATCH_FILE" 2>/dev/null; then
              echo "Patch already applied: $PATCH_FILE"
            else
              git apply --check "$PATCH_FILE"
              git apply "$PATCH_FILE"
              echo "Applied $PATCH_FILE"
            fi
          else
            echo "WARNING: $PATCH_FILE not found, building without distro patch"
          fi

      - name: Build RPM
        run: |
          . "$HOME/.cargo/env"
          rm -rf src-tauri/target/release/bundle/rpm
          scripts/build-webclients.sh
          VERSION=$(node -p "require('./package.json').version")
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          sed -i "0,/^version = \"[^\"]*\"/s//version = \"$VERSION\"/" src-tauri/Cargo.toml
          npm install
          npx tauri build --bundles rpm --verbose

      - name: Normalize RPM filename
        run: |
          cd src-tauri/target/release/bundle/rpm
          shopt -s nullglob
          for file in Proton\ Drive*.rpm; do
            mv "$file" "${file/Proton Drive/proton-drive}"
          done

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package-opensuse-tumbleweed
          path: src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error
          retention-days: 30
