name: Build Snap Core26

"on":
  push:
    branches:
      - main
      - dev
      - alpha
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      distro_patch:
        description: "Snap base patch name (e.g. core26)"
        required: false
        default: "core26"

permissions:
 contents: read

env:
 RUST_VERSION: stable
 DISTRO_TYPE: snap

jobs:
 build-snap:
  name: Snap Package
  runs-on: ubuntu-24.04
  timeout-minutes: 120
  defaults:
   run:
    shell: bash

  steps:
   - name: Install build dependencies
     run: |
      sudo apt-get update
      sudo apt-get install -y \
       bash git curl wget build-essential file pkg-config \
       libssl-dev libwebkit2gtk-4.1-dev libgtk-3-dev \
       libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev \
       patchelf python3 ca-certificates \
       libvips-dev libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev
      curl -fsSL https://deb.nodesource.com/setup_22.x | sudo bash -
      sudo apt-get install -y nodejs
      sudo snap install snapcraft --classic
      sudo snap install core26 --channel=latest/stable
      snap list core26

   - name: Checkout repository
     uses: actions/checkout@v4

   - name: Install Rust
     run: |
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "${RUST_VERSION}"
      echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      . "$HOME/.cargo/env"
      rustc --version
      cargo --version

   - name: Cache Cargo
     uses: actions/cache@v4
     with:
      path: |
       ~/.cargo/bin/
       ~/.cargo/registry/index/
       ~/.cargo/registry/cache/
       ~/.cargo/git/db/
       src-tauri/target/
      key: snap-core26-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
      restore-keys: snap-core26-cargo-

   - name: Clone WebClients
     run: |
      git clone --depth=1 --single-branch --branch main https://github.com/ProtonMail/WebClients.git WebClients

   - name: Apply distro patch
     run: |
      DISTRO_PATCH="${{ github.event.inputs.distro_patch || 'core26' }}"
      PATCH_FILE="patches/snap/${DISTRO_PATCH}.patch"
      if [ -f "$PATCH_FILE" ]; then
       git apply "$PATCH_FILE"
       echo "Applied $PATCH_FILE"
      else
       echo "WARNING: $PATCH_FILE not found, building without distro patch"
      fi

   - name: Build Snap
     run: |
      . "$HOME/.cargo/env"
      scripts/build-webclients.sh
      VERSION=$(node -p "require('./package.json').version")
      sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
      sed -i "0,/^version = \"[^\"]*\"/s//version = \"$VERSION\"/" src-tauri/Cargo.toml
      npm install
      cd src-tauri && cargo build --release && cd ..
      if [ ! -f "src-tauri/target/release/proton-drive" ]; then
       echo "Binary not found!"
       exit 1
      fi
      BUILD_CONTEXT="$(mktemp -d)"
      mkdir -p "$BUILD_CONTEXT/packaging/snap"
      mkdir -p "$BUILD_CONTEXT/src-tauri/target/release"
      mkdir -p "$BUILD_CONTEXT/src-tauri/icons"
      cp packaging/snap/proton-drive-wrapper.sh "$BUILD_CONTEXT/packaging/snap/"
      cp packaging/snap/com.proton.drive.desktop "$BUILD_CONTEXT/packaging/snap/"
      cp src-tauri/target/release/proton-drive "$BUILD_CONTEXT/src-tauri/target/release/"
      cp src-tauri/icons/32x32.png "$BUILD_CONTEXT/src-tauri/icons/"
      cp src-tauri/icons/128x128.png "$BUILD_CONTEXT/src-tauri/icons/"
      cp src-tauri/icons/proton-drive.svg "$BUILD_CONTEXT/src-tauri/icons/"
      sed "s/PLACEHOLDER/$VERSION/" packaging/snap/snapcraft.yaml | \
        sed -e "s/base: core24/base: core26/" \
            -e "s/grade: stable/grade: devel/" \
            -e "/^base: core26/a\\build-base: devel" > "$BUILD_CONTEXT/snapcraft.yaml"
      SNAPCRAFT_STATUS=0
      (
        cd "$BUILD_CONTEXT"
        snapcraft pack --destructive-mode --output "$GITHUB_WORKSPACE"
      ) || SNAPCRAFT_STATUS=$?
      if [ "$SNAPCRAFT_STATUS" -ne 0 ] && [ "$SNAPCRAFT_STATUS" -ne 2 ]; then
       find "$HOME/.local/state/snapcraft/log" -maxdepth 1 -type f -name 'snapcraft-*.log' -print -exec tail -n 200 {} \; || true
       exit "$SNAPCRAFT_STATUS"
      fi
      SNAP_FILE="$(find . "$BUILD_CONTEXT" -maxdepth 1 -type f \( -name '*.snap' -o -name 'protondrive-linux-repo' \) | head -1)"
      if [ -z "$SNAP_FILE" ]; then
       echo "No Snap package found!"
       exit 1
      fi
      mv "$SNAP_FILE" "proton-drive_${VERSION}_core26_amd64.snap"
      rm -rf "$BUILD_CONTEXT"

   - name: Upload Snap artifact
     uses: actions/upload-artifact@v4
     with:
      name: snap-package-core26
      path: "proton-drive_*_core26_amd64.snap"
      if-no-files-found: error
      retention-days: 30
