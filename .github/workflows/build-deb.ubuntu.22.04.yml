name: Build DEB Ubuntu 22.04

"on":
  push:
    branches:
    - main
    - dev
    - alpha
    tags:
    - "v*"
  workflow_dispatch:
    inputs:
      distro_patch:
        description: "Distro patch name (e.g. ubuntu.22.04)"
        required: false
        default: "ubuntu.22.04"

permissions:
  contents: read

env:
  RUST_VERSION: stable
  DISTRO_TYPE: deb

jobs:
  build-deb:
    name: Debian Package
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            bash git curl wget build-essential file pkg-config \
            libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            patchelf python3 ca-certificates \
            libvips-dev libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev \
            lsb-release gnupg2 software-properties-common
          # Ubuntu 22.04 only has webkit2gtk-4.0 (libsoup2.4); Tauri v2 needs -4.1 (libsoup3).
          # Add Debian bookworm repo to pull webkit2gtk-4.1 + libsoup3.
          # Fetch the GPG keys first so apt can verify the bookworm repo.
          apt-get install -y gnupg debian-archive-keyring || true
          curl -fsSL https://ftp.debian.org/debian/pool/main/d/debian-archive-keyring/debian-archive-keyring_2023.5_all.deb -o /tmp/debian-keyring.deb 2>/dev/null && dpkg -i /tmp/debian-keyring.deb 2>/dev/null || true
          echo "deb [signed-by=/usr/share/keyrings/debian-archive-keyring.gpg] http://deb.debian.org/debian bookworm main" > /etc/apt/sources.list.d/debian-bookworm.list
          apt-get update 2>/dev/null || {
            echo "GPG verification failed, falling back to trusted=yes"
            echo "deb [trusted=yes] http://deb.debian.org/debian bookworm main" > /etc/apt/sources.list.d/debian-bookworm.list
            apt-get update
          }
          apt-get install -y -t bookworm \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "${RUST_VERSION}"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          . "$HOME/.cargo/env"
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: deb-ubuntu2204-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: deb-ubuntu2204-cargo-

      - name: Clone WebClients
        run: |
          git clone --depth=1 --single-branch --branch main https://github.com/ProtonMail/WebClients.git WebClients

      - name: Apply distro patch
        run: |
          DISTRO_PATCH="${{ github.event.inputs.distro_patch || 'ubuntu.22.04' }}"
          PATCH_FILE="patches/deb/${DISTRO_PATCH}.patch"
          if [ -f "$PATCH_FILE" ]; then
            git apply "$PATCH_FILE"
            echo "Applied $PATCH_FILE"
          else
            echo "WARNING: $PATCH_FILE not found, building without distro patch"
          fi

      - name: Build DEB
        run: |
          . "$HOME/.cargo/env"
          scripts/build-webclients.sh
          VERSION=$(node -p "require('./package.json').version")
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          sed -i "0,/^version = \"[^\"]*\"/s//version = \"$VERSION\"/" src-tauri/Cargo.toml
          npm install
          npx tauri build --bundles deb --verbose

      - name: Bundle webkit2gtk-4.1 libs for Ubuntu 22.04
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cd src-tauri/target/release/bundle/deb
          ORIG_DEB="$(ls *.deb 2>/dev/null | head -1)"
          if [ -z "$ORIG_DEB" ]; then echo "No DEB found!"; exit 1; fi
          mkdir -p rebuild && cd rebuild
          dpkg-deb -R "../$ORIG_DEB" .
          BUNDLED_DIR="usr/lib/proton-drive"
          mkdir -p "$BUNDLED_DIR"
          for lib in \
            /usr/lib/x86_64-linux-gnu/libwebkit2gtk-4.1.so.0 \
            /usr/lib/x86_64-linux-gnu/libwebkit2gtk-4.1.so.0.*.*.* \
            /usr/lib/x86_64-linux-gnu/libjavascriptcoregtk-4.1.so.0 \
            /usr/lib/x86_64-linux-gnu/libjavascriptcoregtk-4.1.so.0.*.*.* \
            /usr/lib/x86_64-linux-gnu/libsoup-3.0.so.0 \
            /usr/lib/x86_64-linux-gnu/libsoup-3.0.so.0.*.*.* \
            /usr/lib/x86_64-linux-gnu/libwebp.so.7 \
            /usr/lib/x86_64-linux-gnu/libenchant-2.so.2 \
            /usr/lib/x86_64-linux-gnu/libmanette-0.2.so.0 \
            /usr/lib/x86_64-linux-gnu/libWPEBackend-fdo-1.0.so.1 \
            /usr/lib/x86_64-linux-gnu/libwpe-1.0.so.1; do
            for f in $lib; do
              if [ -f "$f" ]; then
                cp -L "$f" "$BUNDLED_DIR/"
                echo "Bundled: $(basename $f)"
              fi
            done
          done
          for proc in WebKitNetworkProcess WebKitWebProcess WebKitGPUProcess; do
            if [ -f "/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1/$proc" ]; then
              cp -L "/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1/$proc" "$BUNDLED_DIR/"
              echo "Bundled: $proc"
            fi
          done
          mv usr/bin/proton-drive usr/bin/proton-drive-bin
          cat > usr/bin/proton-drive << 'WRAPPER'
          #!/bin/bash
          export LD_LIBRARY_PATH="/usr/lib/proton-drive${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          export WEBKIT_EXEC_PATH="/usr/lib/proton-drive/WebKitWebProcess"
          export WEBKIT_DISABLE_DMABUF_RENDERER=1
          export WEBKIT_DISABLE_COMPOSITING_MODE=1
          export WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS=1
          export GDK_GL=disable
          export LIBGL_ALWAYS_SOFTWARE=1
          export GSK_RENDERER=cairo
          exec /usr/bin/proton-drive-bin "$@"
          WRAPPER
          chmod +x usr/bin/proton-drive
          sed -i 's/libwebkit2gtk-4.1-0/libwebkit2gtk-4.0-37/g' DEBIAN/control
          NEW_DEB="proton-drive_${VERSION}_ubuntu2204_bundled_amd64.deb"
          dpkg-deb -b . "../$NEW_DEB"
          cd ..
          rm -f "$ORIG_DEB"
          rm -rf rebuild

      - name: Normalize DEB filename
        run: |
          cd src-tauri/target/release/bundle/deb
          for file in *.deb; do
            if [ -f "$file" ]; then
              new_name="$(echo "$file" | sed 's/Proton\.Drive/proton-drive/g; s/Proton Drive/proton-drive/g')"
              if [ "$file" != "$new_name" ]; then
                mv "$file" "$new_name"
              fi
            fi
          done

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package-ubuntu2204
          path: src-tauri/target/release/bundle/deb/proton-drive_*_ubuntu2204_bundled_amd64.deb
          if-no-files-found: error
          retention-days: 30
