name: Build DEB Ubuntu 22.04

"on":
  push:
    branches:
      - main
      - dev
      - alpha
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      distro_patch:
        description: "Distro patch name (e.g. ubuntu.22.04)"
        required: false
        default: "ubuntu.22.04"

permissions:
  contents: read

env:
  RUST_VERSION: stable
  DISTRO_TYPE: deb
  DISTRO_PATCH: "${{ github.event.inputs.distro_patch || 'ubuntu.22.04' }}"

jobs:
  build-deb:
    name: Debian Package
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            bash git curl wget build-essential file pkg-config \
            libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            patchelf python3 ca-certificates \
            libvips-dev libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev \
            lsb-release gnupg2 software-properties-common
          # Ubuntu 22.04 only has webkit2gtk-4.0 (libsoup2.4); Tauri v2 needs -4.1 (libsoup3).
          # Add Debian bookworm repo to pull webkit2gtk-4.1 + libsoup3.
          echo "deb [signed-by=/usr/share/keyrings/debian-archive-keyring.gpg] http://deb.debian.org/debian bookworm main" > /etc/apt/sources.list.d/debian-bookworm.list
          apt-get install -y debian-archive-keyring || true
          apt-get update
          apt-get install -y -t bookworm \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "${RUST_VERSION}"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          . "$HOME/.cargo/env"
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: deb-ubuntu2204-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: deb-ubuntu2204-cargo-

      - name: Clone WebClients
        run: |
          git clone --depth=1 --single-branch --branch main https://github.com/ProtonMail/WebClients.git WebClients

      - name: Apply distro patch
        run: |
          PATCH_FILE="patches/deb/${DISTRO_PATCH}.patch"
          if [ -f "$PATCH_FILE" ]; then
            git apply "$PATCH_FILE"
            echo "Applied $PATCH_FILE"
          else
            echo "WARNING: $PATCH_FILE not found, building without distro patch"
          fi

      - name: Build DEB
        run: |
          . "$HOME/.cargo/env"
          scripts/build-webclients.sh
          VERSION=$(node -p "require('./package.json').version")
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          sed -i "0,/^version = \"[^\"]*\"/s//version = \"$VERSION\"/" src-tauri/Cargo.toml
          npm install
          npx tauri build --bundles deb --verbose

      - name: Normalize DEB filename
        run: |
          cd src-tauri/target/release/bundle/deb
          for file in *.deb; do
            if [ -f "$file" ]; then
              new_name="$(echo "$file" | sed 's/Proton\.Drive/proton-drive/g; s/Proton Drive/proton-drive/g')"
              if [ "$file" != "$new_name" ]; then
                mv "$file" "$new_name"
              fi
            fi
          done

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package-ubuntu2204
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error
          retention-days: 30
