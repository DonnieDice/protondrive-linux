name: Build DEB Ubuntu 24.04

"on":
  push:
    branches:
      - main
      - alpha
      - "feature/**"
      - "fix/**"
      - "chore/**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      distro_patch:
        description: "Distro patch name (e.g. ubuntu.24.04)"
        required: false
        default: "ubuntu.24.04"

permissions:
  contents: read

env:
  RUST_VERSION: stable
  DISTRO_TYPE: deb
  DISTRO_SUFFIX: ubuntu24.04
  WEBCLIENTS_REF: main

jobs:
  build-deb:
    name: Debian Package
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            bash git curl wget build-essential file pkg-config \
            libssl-dev libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev \
            patchelf python3 ca-certificates \
            libvips-dev libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev
          curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
          apt-get install -y nodejs

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "${RUST_VERSION}"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          . "$HOME/.cargo/env"
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: deb-ubuntu2404-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: deb-ubuntu2404-cargo-

      - name: Clone WebClients
        run: |
          git clone --depth=1 --single-branch --branch "${WEBCLIENTS_REF}" https://github.com/ProtonMail/WebClients.git WebClients

      - name: Apply distro patch
        run: |
          DISTRO_PATCH="${{ github.event.inputs.distro_patch || 'ubuntu.24.04' }}"
          PATCH_FILE="patches/deb/${DISTRO_PATCH}.patch"
          if [ -f "$PATCH_FILE" ]; then
            git apply "$PATCH_FILE"
            echo "Applied $PATCH_FILE"
          else
            echo "WARNING: $PATCH_FILE not found, building without distro patch"
          fi

      - name: Build DEB
        run: |
          . "$HOME/.cargo/env"
          rm -rf src-tauri/target/release/bundle/deb
          scripts/build-webclients.sh
              VERSION=$(node -p "require('./package.json').version")
              sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
              sed -i "0,/^version = \"[^\"]*\"/s//version = \"$VERSION\"/" src-tauri/Cargo.toml
              npm install
              npx tauri build --bundles deb --verbose

          - name: Normalize DEB filename
            run: |
              VERSION=$(node -p "require('./package.json').version")
              cd src-tauri/target/release/bundle/deb
              for file in *.deb; do
                if [ -f "$file" ]; then
                  target="proton-drive_${VERSION}_${DISTRO_SUFFIX}_amd64.deb"
                  if [ "$file" != "$target" ]; then
                    mv "$file" "$target"
                  fi
                fi
              done

          - name: Upload DEB artifact
            uses: actions/upload-artifact@v4
            with:
              name: deb-package-ubuntu2404
              path: src-tauri/target/release/bundle/deb/proton-drive_*_ubuntu24.04_amd64.deb
              if-no-files-found: error
              retention-days: 30
