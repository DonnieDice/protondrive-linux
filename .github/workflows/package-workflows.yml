name: Package Workflows

on:
  push:
    branches:
      - "main"
      - "alpha"
      - "feature/**"
      - "fix/**"
      - "chore/**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      workflow:
        description: Workflow implementation to run, or all
        required: false
        default: all
      distro_patch:
        description: Optional distro patch override
        required: false
      appimage_target:
        description: AppImage target
        required: false
        default: linux-baseline
      tag:
        description: Release tag, for release workflow
        required: false
      version:
        description: Version to publish
        required: false
      snap_base:
        description: Snap base to publish
        required: false
        default: core24
      channel:
        description: Store channel
        required: false
        default: stable

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  login_routing_regression_checks:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    name: Login/2FA Routing Regression Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Guard login and 2FA routing invariants
        run: bash scripts/ci/check-login-routing-regressions.sh

  sync_regression_checks:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    name: Sync Regression Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Guard sync bridge invariants
        run: bash scripts/ci/check-sync-regressions.sh

  rust_regression_tests:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    name: Rust Login, Cookie, and Sync Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Tauri test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev \
            pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Prepare Tauri frontendDist fixture
        run: |
          mkdir -p WebClients/applications/drive/dist
          printf '<!doctype html><html><body>rust regression fixture</body></html>\n' \
            > WebClients/applications/drive/dist/index.html

      - name: Run navigation regression tests
        run: cargo test --manifest-path src-tauri/Cargo.toml proton_navigation::tests

      - name: Run cookie persistence regression tests
        run: cargo test --manifest-path src-tauri/Cargo.toml webview_cookies::tests

      - name: Run live sync regression tests
        run: cargo test --manifest-path src-tauri/Cargo.toml live_sync::tests

  build_apk_alpine_3_20:
    if: github.event_name == 'workflow_dispatch' && (inputs.workflow == 'all' || inputs.workflow == 'build-apk-alpine-3-20')
    name: Alpine 3.20 APK
    runs-on: ubuntu-latest
    container:
      image: alpine:3.20
    timeout-minutes: 120
    defaults:
      run:
        shell: /bin/sh -e {0}

    env:
      RUST_VERSION: stable
      DISTRO_TYPE: apk
      DISTRO_PATCH: ${{ github.event.inputs.distro_patch || 'alpine.3.20' }}
      DISTRO_SUFFIX: alpine320
      WEBCLIENTS_REF: main
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/apk/alpine-3.20

  build_apk_alpine_3_22:
    if: github.event_name == 'workflow_dispatch' && (inputs.workflow == 'all' || inputs.workflow == 'build-apk-alpine-3-22')
    name: Alpine 3.22 APK
    runs-on: ubuntu-latest
    container:
      image: alpine:3.22
    timeout-minutes: 120
    defaults:
      run:
        shell: /bin/sh -e {0}

    env:
      RUST_VERSION: stable
      DISTRO_TYPE: apk
      DISTRO_PATCH: ${{ github.event.inputs.distro_patch || 'alpine.3.22' }}
      DISTRO_SUFFIX: alpine322
      WEBCLIENTS_REF: main
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/apk/alpine-3.22

  build_apk_alpine_3_23:
    if: github.event_name == 'workflow_dispatch' && (inputs.workflow == 'all' || inputs.workflow == 'build-apk-alpine-3-23')
    name: Alpine 3.23 APK
    runs-on: ubuntu-latest
    container:
      image: alpine:3.23
    timeout-minutes: 120
    defaults:
      run:
        shell: /bin/sh -e {0}

    env:
      RUST_VERSION: stable
      DISTRO_TYPE: apk
      DISTRO_PATCH: ${{ github.event.inputs.distro_patch || 'alpine.3.23' }}
      DISTRO_SUFFIX: alpine323
      WEBCLIENTS_REF: main
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/apk/alpine-3.23

  build_appimage:
    if: github.event_name == 'workflow_dispatch' && (inputs.workflow == 'all' || inputs.workflow == 'build-appimage')
    name: AppImage ${{ github.event.inputs.appimage_target || 'linux-baseline' }}
    runs-on: ubuntu-latest
    container:
      image: debian:12
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    env:
      RUST_VERSION: stable
      DISTRO_TYPE: appimage
      WEBCLIENTS_REF: main
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/appimage/linux-baseline

  build_aur:
    if: github.event_name == 'workflow_dispatch' && (inputs.workflow == 'all' || inputs.workflow == 'build-aur')
    name: AUR Arch Native
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    env:
      RUST_VERSION: stable
      DISTRO_TYPE: aur
      WEBCLIENTS_REF: main
      WEBCLIENTS_COMMIT: bbad1a0a482227b93a2e963a232463aede9b8abf
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/aur/arch-native

  build_deb_debian_12:
    if: github.event_name == 'workflow_dispatch' && (inputs.workflow == 'all' || inputs.workflow == 'build-deb-debian-12')
    name: Debian 12 DEB
    runs-on: ubuntu-latest
    container:
      image: debian:12
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    env:
      RUST_VERSION: stable
      DISTRO_TYPE: deb
      DISTRO_PATCH: ${{ github.event.inputs.distro_patch || 'debian.12' }}
      DISTRO_SUFFIX: debian12
      WEBCLIENTS_REF: main
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/deb/debian-12

  build_deb_debian_13:
    if: github.event_name == 'workflow_dispatch' && (inputs.workflow == 'all' || inputs.workflow == 'build-deb-debian-13')
    name: Debian 13 DEB
    runs-on: ubuntu-latest
    container:
