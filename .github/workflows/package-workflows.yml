    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    env:
      RUST_VERSION: stable
      DISTRO_TYPE: deb
      DISTRO_SUFFIX: debian13
      WEBCLIENTS_REF: main
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/deb/debian-13

  build_deb_ubuntu_24_04:
    if: github.event_name == 'workflow_dispatch' && (inputs.workflow == 'all' || inputs.workflow == 'build-deb-ubuntu-24-04')
    name: Ubuntu 24.04 DEB
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    env:
      RUST_VERSION: stable
      DISTRO_TYPE: deb
      DISTRO_SUFFIX: ubuntu24.04
      WEBCLIENTS_REF: main
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/deb/ubuntu-24.04

  build_deb_ubuntu_26_04:
    if: github.event_name == 'workflow_dispatch' && (inputs.workflow == 'all' || inputs.workflow == 'build-deb-ubuntu-26-04')
    name: Ubuntu 26.04 DEB
    runs-on: ubuntu-latest
    container:
      image: ubuntu:26.04
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    env:
      RUST_VERSION: stable
      DISTRO_TYPE: deb
      DISTRO_SUFFIX: ubuntu26.04
      WEBCLIENTS_REF: main
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/deb/ubuntu-26.04

  build_flatpak_gnome_50:
    if: github.event_name == 'workflow_dispatch' && (inputs.workflow == 'all' || inputs.workflow == 'build-flatpak-gnome-50')
    name: Flatpak GNOME 50
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    env:
      RUST_VERSION: stable
      DISTRO_TYPE: flatpak
      WEBCLIENTS_REF: main
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/flatpak/gnome-50

  build_flatpak_gnome_49:
    if: github.event_name == 'workflow_dispatch' && (inputs.workflow == 'all' || inputs.workflow == 'build-flatpak-gnome-49')
    name: Flatpak GNOME 49 Package
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    env:
      RUST_VERSION: stable
      DISTRO_TYPE: flatpak
      WEBCLIENTS_REF: main
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/flatpak/gnome-49

  build_rpm_el10:
    if: github.event_name == 'workflow_dispatch' && (inputs.workflow == 'all' || inputs.workflow == 'build-rpm-el10')
    name: EL10 RPM
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream10
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    env:
      RUST_VERSION: stable
      DISTRO_TYPE: rpm
      WEBCLIENTS_REF: main
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/rpm/el10

  build_rpm_fedora_43:
    if: github.event_name == 'workflow_dispatch' && (inputs.workflow == 'all' || inputs.workflow == 'build-rpm-fedora-43')
    name: Fedora 43 RPM
    runs-on: ubuntu-latest
    container:
      image: fedora:43
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    env:
      RUST_VERSION: stable
      DISTRO_TYPE: rpm
      DISTRO_PATCH: ${{ github.event.inputs.distro_patch || 'fedora.43' }}
      WEBCLIENTS_REF: main
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/rpm/fedora-43

  build_rpm_fedora_44:
    if: github.event_name == 'workflow_dispatch' && (inputs.workflow == 'all' || inputs.workflow == 'build-rpm-fedora-44')
    name: Fedora 44 RPM
    runs-on: ubuntu-latest
    container:
      image: fedora:44
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    env:
      RUST_VERSION: stable
      DISTRO_TYPE: rpm
      DISTRO_PATCH: ${{ github.event.inputs.distro_patch || 'fedora.44' }}
      WEBCLIENTS_REF: main
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/rpm/fedora-44

  build_rpm_opensuse_tumbleweed:
    if: github.event_name == 'workflow_dispatch' && (inputs.workflow == 'all' || inputs.workflow == 'build-rpm-opensuse-tumbleweed')
    name: openSUSE Tumbleweed RPM
    runs-on: ubuntu-latest
    container:
      image: opensuse/tumbleweed:latest
      options: --user root
      env:
        PATH: /usr/local/bin:/usr/bin:/bin
    timeout-minutes: 120
    defaults:
      run:
        shell: /bin/bash -e -o pipefail {0}

    env:
      RUST_VERSION: stable
      DISTRO_TYPE: rpm
      WEBCLIENTS_REF: main
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/rpm/opensuse-tumbleweed

  build_snap_core24:
