    name: Snap core24
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    env:
      RUST_VERSION: stable
      DISTRO_TYPE: snap
      WEBCLIENTS_REF: main
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/snap/core24

  build_snap_core26:
    if: github.event_name == 'workflow_dispatch' && (inputs.workflow == 'all' || inputs.workflow == 'build-snap-core26')
    name: Snap core26
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    # Canonical does not currently publish a Snapcraft rock for core26.
    continue-on-error: true
    defaults:
      run:
        shell: bash

    env:
      RUST_VERSION: stable
      DISTRO_TYPE: snap
      WEBCLIENTS_REF: main
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/snap/core26

  generate_package_specs_generate_aur_pkgbuild:
    if: github.event_name == 'workflow_dispatch' && (inputs.workflow == 'all' || inputs.workflow == 'generate-package-specs-generate-aur-pkgbuild')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/maintenance/generate-package-specs/aur-pkgbuild

  generate_package_specs_generate_rpm_spec:
    if: github.event_name == 'workflow_dispatch' && (inputs.workflow == 'all' || inputs.workflow == 'generate-package-specs-generate-rpm-spec')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/maintenance/generate-package-specs/rpm-spec

