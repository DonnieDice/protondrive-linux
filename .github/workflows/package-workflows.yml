    if: github.event_name == 'workflow_dispatch' && (inputs.workflow == 'all' || inputs.workflow == 'generate-package-specs-create-source-dist')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/maintenance/generate-package-specs/source-dist

  issue_auto_label:
    if: github.event_name == 'issues' || (github.event_name == 'workflow_dispatch' && (inputs.workflow == 'all' || inputs.workflow == 'issue-auto-label'))
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/maintenance/issue-auto-label

  pr_auto_label:
    if: github.event_name == 'pull_request_target' || (github.event_name == 'workflow_dispatch' && (inputs.workflow == 'all' || inputs.workflow == 'pr-auto-label'))
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/maintenance/pr-auto-label

  publish_aur:
    if: github.event_name == 'workflow_dispatch' && inputs.workflow == 'publish-aur'
    runs-on: ubuntu-latest
    timeout-minutes: 15

  
    env:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/aur/publish

  publish_flatpak:
    if: github.event_name == 'workflow_dispatch' && inputs.workflow == 'publish-flatpak'
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      FLATHUB_SSH_PRIVATE_KEY: ${{ secrets.FLATHUB_SSH_PRIVATE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/flatpak/publish

  publish_snap:
    if: github.event_name == 'workflow_dispatch' && inputs.workflow == 'publish-snap'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    # Keep the release flow moving even if the Snap Store is unavailable.
    continue-on-error: true

    env:
      SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/snap/publish

  release:
    needs:
      - build_appimage
      - build_flatpak_gnome_50
      - build_flatpak_gnome_49
      - build_snap_core24
      - build_snap_core26
      - build_aur
      - build_deb_debian_12
      - build_deb_debian_13
      - build_deb_ubuntu_24_04
      - build_deb_ubuntu_26_04
      - build_rpm_fedora_43
      - build_rpm_fedora_44
      - build_rpm_el10
      - build_rpm_opensuse_tumbleweed
      - build_apk_alpine_3_20
      - build_apk_alpine_3_22
      - build_apk_alpine_3_23
    if: always() && github.event_name == 'workflow_dispatch' && inputs.workflow == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 360

  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow implementation
        uses: ./.github/workflows/maintenance/release
