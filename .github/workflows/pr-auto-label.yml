name: Auto-Label Pull Requests
on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Apply labels based on content
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          TITLE_LOWER=$(echo "$PR_TITLE" | tr '[:upper:]' '[:lower:]')
          BODY_LOWER=$(echo "$PR_BODY" | tr '[:upper:]' '[:lower:]')
          COMBINED="$TITLE_LOWER $BODY_LOWER"

          LABELS=()

          # Bug keywords
          if echo "$COMBINED" | grep -qiE '\b(bug|crash|crashes|crashed|error|fail|fails|failed|freez|freeze|freezes|broken|not working|does not work|fix|fixed|fixes|patch|hotfix)\b'; then
            LABELS+=("bug")
          fi

          # Enhancement keywords
          if echo "$COMBINED" | grep -qiE '\b(feature|request|enhancement|add|support|implement|suggestion|idea|improve|new)\b'; then
            LABELS+=("enhancement")
          fi

          # Documentation keywords
          if echo "$COMBINED" | grep -qiE '\b(doc|docs|readme|typo|spelling|grammar|comment|changelog|contributing)\b'; then
            LABELS+=("documentation")
          fi

          # Packaging keywords
          if echo "$COMBINED" | grep -qiE '\b(flatpak|snap|appimage|deb|rpm|apk|aur|package|install|distribution|store|flathub|snapcraft|nix|tauri|cargo)\b'; then
            LABELS+=("packaging")
          fi

          # CI/Workflow keywords
          if echo "$COMBINED" | grep -qiE '\b(ci|cd|workflow|workflow|github actions|build|pipeline|deploy|release|automate)\b'; then
<<<<<<< HEAD
            LABELS+=("ci")
=======
            LABELS+=("packaging")
>>>>>>> 2b4513fbee12f24786e774b4232ce1f7b8579bc0
          fi

          # Release keywords
          if echo "$COMBINED" | grep -qiE '\b(release|version bump|bump version|changelog|tag|v[0-9]+\.[0-9]+\.[0-9]+)\b'; then
            LABELS+=("release")
          fi

          # Review effort estimation
          if echo "$COMBINED" | grep -qiE '\b(typo|small|minor|quick|one line|single file)\b'; then
            LABELS+=("Review effort 1/5")
          fi

          if [ ${#LABELS[@]} -gt 0 ]; then
            LABEL_LIST=$(IFS=,; echo "${LABELS[*]}")
            gh pr edit "$PR_NUMBER" --add-label "$LABEL_LIST"
            echo "Applied labels: $LABEL_LIST"
          else
            echo "No matching labels found for PR content."
          fi
