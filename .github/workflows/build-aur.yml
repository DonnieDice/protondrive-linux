name: Build AUR

on:
  push:
    branches:
      - main
      - dev
      - alpha
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      aur_target:
        description: AUR target (arch, manjaro, endeavour, garuda)
        required: false
        default: arch

permissions:
  contents: read

jobs:
  validate-aur:
    name: AUR ${{ github.event.inputs.aur_target || 'arch' }}
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    timeout-minutes: 30
    defaults:
      run:
        shell: bash

    steps:
      - name: Install Arch build dependencies
        run: |
          pacman -Sy --noconfirm git nodejs python

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync PKGBUILD version
        run: |
          VERSION=$(python -c "import json; print(json.load(open('package.json'))['version'])")
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" aur/PKGBUILD

      - name: Include distro wrapper
        run: |
          AUR_TARGET="${{ github.event.inputs.aur_target || 'arch' }}"
          WRAPPER_FILE="patches/aur/${AUR_TARGET}.wrapper"
          if [ -f "$WRAPPER_FILE" ]; then
            cp "$WRAPPER_FILE" aur/proton-drive.wrapper
            echo "Included ${AUR_TARGET} wrapper script"
          else
            echo "WARNING: No wrapper found for ${AUR_TARGET}, building without"
          fi

      - name: Validate PKGBUILD metadata
        run: |
          cd aur
          useradd -m builder
          chown -R builder:builder .
          su builder -c "makepkg --printsrcinfo > .SRCINFO"
          test -s .SRCINFO
          cat .SRCINFO

      - name: Upload AUR metadata
        uses: actions/upload-artifact@v4
        with:
          name: aur-${{ github.event.inputs.aur_target || 'arch' }}-srcinfo
          path: aur/.SRCINFO
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 30
