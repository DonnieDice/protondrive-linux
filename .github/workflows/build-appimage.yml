name: Build AppImage

on:
  push:
    branches:
      - main
      - dev
      - alpha
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  RUST_VERSION: stable
  DISTRO_TYPE: appimage

jobs:
  build-appimage:
    name: AppImage
    runs-on: ubuntu-latest
    container:
      image: debian:12
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    steps:
      - name: Install AppImage build dependencies
        shell: bash
        run: |
          apt-get update
          apt-get install -y \
            bash \
            git \
            curl \
            wget \
            build-essential \
            file \
            pkg-config \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf \
            fuse \
            libfuse2 \
            nodejs \
            npm \
            python3 \
            ca-certificates \
            libvips-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev
          curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
          apt-get install -y nodejs

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "${RUST_VERSION}"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          . "$HOME/.cargo/env"
          rustc --version
          cargo --version

  - name: Clone WebClients
    run: |
      git clone --depth=1 --single-branch --branch main https://github.com/ProtonMail/WebClients.git WebClients

- name: Apply AppImage distro patch
      run: |
        if [ -f patches/appimage/${{ vars.DISTRO_PATCH || 'ubuntu.24.04' }}.patch ]; then
          git apply patches/appimage/${{ vars.DISTRO_PATCH || 'ubuntu.24.04' }}.patch
          echo "Applied patches/appimage/${{ vars.DISTRO_PATCH || 'ubuntu.24.04' }}.patch"
        fi

  - name: Build WebClients and Tauri binary
        run: |
          . "$HOME/.cargo/env"
          scripts/build-webclients.sh
          VERSION=$(node -p "require('./package.json').version")
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          sed -i "0,/^version = \"[^\"]*\"/s//version = \"$VERSION\"/" src-tauri/Cargo.toml
          npm install
          cargo build --manifest-path src-tauri/Cargo.toml --release

      - name: Build AppImage manually
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          BINARY_PATH="src-tauri/target/release/proton-drive"
          APPDIR="AppDir"

          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/share/applications"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/scalable/apps"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/128x128/apps"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/32x32/apps"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"

          cp "$BINARY_PATH" "$APPDIR/usr/bin/proton-drive"
          chmod +x "$APPDIR/usr/bin/proton-drive"

          cat > "$APPDIR/usr/share/applications/com.proton.drive.desktop" << 'EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Proton Drive
          Comment=Secure cloud storage
          Exec=proton-drive %U
          Icon=com.proton.drive
          Categories=Utility;Network;FileTransfer;
          Keywords=proton;drive;cloud;storage;sync;
          Terminal=false
          StartupWMClass=proton-drive
          StartupNotify=true
          EOF

          cp src-tauri/icons/proton-drive.svg "$APPDIR/usr/share/icons/hicolor/scalable/apps/com.proton.drive.svg"
          cp src-tauri/icons/128x128.png "$APPDIR/usr/share/icons/hicolor/128x128/apps/com.proton.drive.png"
          cp src-tauri/icons/32x32.png "$APPDIR/usr/share/icons/hicolor/32x32/apps/com.proton.drive.png"
          cp src-tauri/icons/128x128@2x.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/com.proton.drive.png"
          cp "$APPDIR/usr/share/applications/com.proton.drive.desktop" "$APPDIR/com.proton.drive.desktop"
          cp src-tauri/icons/proton-drive.svg "$APPDIR/com.proton.drive.svg"
          ln -sf usr/share/icons/hicolor/128x128/apps/com.proton.drive.png "$APPDIR/.DirIcon"

    cat > "$APPDIR/AppRun" << 'APPRUN'
#!/bin/bash
# WebKitGTK environment — must be set before the process starts.
# Ubuntu 24.04+ ships WebKitGTK 2.46+ with Mesa 24.x; setting
# GDK_GL=disable + LIBGL_ALWAYS_SOFTWARE=1 there causes the
# WebKitWebProcess to SIGABRT during heavy re-renders (post-2FA).
# Detect the distro and apply the minimal set of workarounds.

WEBKIT_DISABLE_DMABUF_RENDERER=1
WEBKIT_DISABLE_COMPOSITING_MODE=1
WEBKIT_FORCE_SANDBOX=0
GSK_RENDERER=cairo

if [ -f /etc/os-release ]; then
    . /etc/os-release
    case "$ID" in
        ubuntu|pop|linuxmint)
            # Ubuntu 24.04+: Mesa 24.x EGL works; only disable DMABUF + compositing.
            # Do NOT set GDK_GL=disable or LIBGL_ALWAYS_SOFTWARE — they crash WebKitWebProcess.
            export GDK_GL=software
            ;;
        *)
            # Debian 12 / Fedora / others with older Mesa that needs software fallback.
            export GDK_GL=disable
            export LIBGL_ALWAYS_SOFTWARE=1
            ;;
    esac
else
    # No os-release — assume older Mesa, use full software fallback.
    export GDK_GL=disable
    export LIBGL_ALWAYS_SOFTWARE=1
fi

export WEBKIT_DISABLE_DMABUF_RENDERER
export WEBKIT_DISABLE_COMPOSITING_MODE
export WEBKIT_FORCE_SANDBOX
export GSK_RENDERER

HERE="$(dirname "$(readlink -f "${0}")")"
export PATH="${HERE}/usr/bin:${PATH}"
export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
exec "${HERE}/usr/bin/proton-drive" "$@"
APPRUN
          chmod +x "$APPDIR/AppRun"

          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract
          ARCH=x86_64 ./squashfs-root/AppRun "$APPDIR" "proton-drive_${VERSION}_amd64.AppImage"

          mkdir -p src-tauri/target/release/bundle/appimage
          mv "proton-drive_${VERSION}_amd64.AppImage" src-tauri/target/release/bundle/appimage/

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage-package
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 30
