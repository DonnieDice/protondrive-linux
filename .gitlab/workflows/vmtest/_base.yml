# Shared template for all vmtest:* jobs.
# Runs regression checks + GUI load test on the VM after the install stage succeeds.
# Re-exports all three result directories (transfer/ install/ test/) so the report
# stage only needs to depend on vmtest jobs to get the full picture.

.vmtest:base:
  stage: vmtest
  image: alpine:latest
  interruptible: true
  before_script:
    - apk add --no-cache bash openssh-client coreutils
  artifacts:
    name: "vmtest-results-$CI_JOB_NAME"
    paths:
      - transfer-results/
      - install-results/
      - test-results/
      - verify-results/ui-screenshots/       # compositor test screenshots (OCR debug)
    when: always
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
    - when: manual
      allow_failure: true
