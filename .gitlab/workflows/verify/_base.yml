# Shared template for all verify:* jobs (one file per distro/VM in this dir).
# Each per-distro file extends .verify:base and only sets `needs` + `script`.
# See ../VERIFY.md for the architecture and the one-time VM_SSH_KEY setup.

.verify:base:
  stage: verify
  image: alpine:latest
  interruptible: true
  # Untagged: runs on the default shared runner, whose docker-executor job
  # containers reach the 192.168.1.0/24 VM subnet via the host network.
  before_script:
    - apk add --no-cache bash openssh-client coreutils
  # Persist each VM's structured result record for the deployment matrix —
  # kept even on failure so the matrix shows the full fleet state.
  artifacts:
    name: "verify-results-$CI_JOB_NAME"
    paths: [verify-results/]
    when: always
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
    - when: manual
      allow_failure: true
