# ─── Test: Rust Coverage Gate ─────────────────────────────────────────────────

test:coverage:
  extends: .rules:test
  stage: test
  image: debian:12
  timeout: 45m
  dependencies: []
  variables:
    CARGO_HOME: "${CI_PROJECT_DIR}/.cargo-coverage"
    # Keep the job required from day one, but let GitLab project/group variables
    # ratchet this upward after the first real CI baseline is measured.
    RUST_COVERAGE_MIN: "0"
  cache:
    key: test-coverage-cargo
    paths:
      - .cargo-coverage/
      - src-tauri/target/
    when: always
  before_script:
    - apt-get update && apt-get install -y bash curl git wget build-essential pkg-config
        libssl-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev
        librsvg2-dev libsoup-3.0-dev ca-certificates
    - source scripts/ci/lib/install-rust.sh
    - cargo install cargo-llvm-cov --locked
  script:
    - mkdir -p WebClients/applications/drive/dist coverage
    - |
      printf '<!doctype html><html><body>rust coverage fixture</body></html>\n' \
        > WebClients/applications/drive/dist/index.html
    - cargo llvm-cov --manifest-path src-tauri/Cargo.toml
        --cobertura --output-path coverage/cobertura.xml
        --summary-only --fail-under-lines "${RUST_COVERAGE_MIN}"
  coverage: '/TOTAL\s+\d+\.\d+%/'
  artifacts:
    when: always
    paths:
      - coverage/cobertura.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura.xml
    expire_in: 30 days
