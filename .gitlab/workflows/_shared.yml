variables:
  RUST_VERSION: stable
  WEBCLIENTS_REF: main
  WEBCLIENTS_COMMIT: "bbad1a0a482227b93a2e963a232463aede9b8abf"
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  # Cap cargo parallelism per job so concurrent builds don't oversubscribe the
  # runner's CPU set. Runner cpuset = 12 cores (6-17); with concurrent=3 that is
  # 3 jobs x 4 cores = 12 threads, a clean 1:1 with the cores (no thrash).
  CARGO_BUILD_JOBS: "4"
  # Cap Node/webpack heap per job. Webpack OOMs at 8 concurrent builds without
  # this limit. 4 GB x 8 jobs = 32 GB peak Node usage, leaving headroom in 48 GB.
  NODE_OPTIONS: "--max-old-space-size=4096"

# ─── Rule templates ───────────────────────────────────────────────────────────

# Fast gates run on every MR, branch push, and tag. Keep these jobs cheap enough
# to be required before merge: formatting, clippy, Rust unit tests, and coverage.
.rules:test:
  interruptible: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# Heavier regression jobs exercise shell scripts, CI parity, and UI wiring. They
# run automatically only for protected refs/tags/schedules, with a manual escape
# hatch for one-off branch validation.
.rules:regression:
  interruptible: true
  rules:
    - if: $CI_COMMIT_TAG
    - if: '$CI_COMMIT_REF_PROTECTED == "true"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web" && $RUN_REGRESSION_TESTS == "true"'
    - if: '$CI_PIPELINE_SOURCE == "api" && $RUN_REGRESSION_TESTS == "true"'
    - when: manual
      allow_failure: true

# Package builds and downstream artifact smoke stages are protected-heavy work.
# They should not run on unprotected feature branches or ordinary MR pipelines.
.rules:build:
  interruptible: true
  retry: 1   # webpack OOM (SIGKILL) is intermittent under parallel runner load
  rules:
    # Only rebuild when source or build config changed, and only on trusted refs.
    # Docs, test scripts, CI report/transfer/install/vmtest yml changes skip builds.
    - if: '$CI_COMMIT_REF_PROTECTED == "true"'
      changes: &src_globs
        - src/**/*
        - src-tauri/**/*
        - patches/**/*
        - package.json
        - package-lock.json
        - Cargo.toml
        - Cargo.lock
        - scripts/build-*.sh
        - scripts/ci/lib/install-rust.sh
        - scripts/ci/lib/fetch-webclients.sh
        - .gitlab/workflows/builds.yml
        - .gitlab/workflows/_shared.yml
    - if: $CI_COMMIT_TAG   # release tags always build
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      changes: *src_globs
    - if: '$CI_PIPELINE_SOURCE == "web" && $RUN_PACKAGE_BUILDS == "true"'
    - if: '$CI_PIPELINE_SOURCE == "api" && $RUN_PACKAGE_BUILDS == "true"'
    - when: manual          # manual override to force a rebuild
      allow_failure: true

.rules:release:
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
    - if: $CI_COMMIT_TAG =~ /^v.*/
    - when: never

.rules:publish:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
    - when: manual
      allow_failure: true

# ─── Reusable install helpers ────────────────────────────────────────────────

.install_rust:
  before_script:
    - apt-get update && apt-get install -y bash curl
    - source scripts/ci/lib/install-rust.sh

.install_rust_full:
  before_script:
    - apt-get update && apt-get install -y bash curl git wget build-essential pkg-config
        libssl-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev
        librsvg2-dev libsoup-3.0-dev
    - source scripts/ci/lib/install-rust.sh
