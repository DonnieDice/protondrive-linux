variables:
  RUST_VERSION: stable
  WEBCLIENTS_REF: main
  WEBCLIENTS_COMMIT: "bbad1a0a482227b93a2e963a232463aede9b8abf"
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  # Cap cargo parallelism per job so concurrent builds don't oversubscribe the
  # runner's CPU set. Runner cpuset = 12 cores (6-17); with concurrent=3 that is
  # 3 jobs x 4 cores = 12 threads, a clean 1:1 with the cores (no thrash).
  CARGO_BUILD_JOBS: "4"
  # Cap Node/webpack heap per job. Webpack OOMs at 8 concurrent builds without
  # this limit. 4 GB x 8 jobs = 32 GB peak Node usage, leaving headroom in 48 GB.
  NODE_OPTIONS: "--max-old-space-size=4096"

# ─── Rule templates ───────────────────────────────────────────────────────────

.rules:build:
  interruptible: true
  retry: 1   # webpack OOM (SIGKILL) is intermittent under parallel runner load
  rules:
    # Package/spec builds are release work only. Branch and MR pipelines are
    # blocked at workflow level; explicit release-test pipelines run tests only.
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+.*$/
    - when: never

.rules:release:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+.*$/
    - when: never

.rules:publish:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+.*$/
      when: manual
      allow_failure: true
    - when: never

.rules:test:
  interruptible: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+.*$/
    - if: '$CI_PIPELINE_SOURCE == "web" && $RUN_RELEASE_TESTS == "true"'
    - if: '$CI_PIPELINE_SOURCE == "api" && $RUN_RELEASE_TESTS == "true"'
    - when: never

# ─── Reusable install helpers ────────────────────────────────────────────────

.install_rust:
  before_script:
    - apt-get update && apt-get install -y bash curl
    - source scripts/ci/lib/install-rust.sh

.install_rust_full:
  before_script:
    - apt-get update && apt-get install -y bash curl git wget build-essential pkg-config
        libssl-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev
        librsvg2-dev libsoup-3.0-dev
    - source scripts/ci/lib/install-rust.sh
