# ─── Deployment / verification tracking matrix ───────────────────────────────
# Aggregates results from all three VM pipeline stages:
#   transfer-results/  (artifact found + SCP status per distro)
#   install-results/   (package manager install outcome per distro)
#   test-results/      (regression + GUI load test pass/fail per distro)
#
# Each vmtest:* job re-exports all three result directories in its artifact, so
# this job only needs to depend on the vmtest jobs to get the full picture.
# Runs even when some jobs fail (when: always) so the matrix always shows the
# full fleet state. JUnit output renders in the GitLab MR widget.

report:verify-matrix:
  stage: report
  image: python:3.12-slim
  needs:
    - job: "vmtest:alpine-3.20"
      artifacts: true
    - job: "vmtest:alpine-3.22"
      artifacts: true
    - job: "vmtest:debian-12"
      artifacts: true
    - job: "vmtest:debian-13"
      artifacts: true
    - job: "vmtest:ubuntu-24.04"
      artifacts: true
    - job: "vmtest:ubuntu-26.04"
      artifacts: true
    - job: "vmtest:rpm-el10"
      artifacts: true
    - job: "vmtest:rpm-fedora-43"
      artifacts: true
    - job: "vmtest:rpm-opensuse-tumbleweed"
      artifacts: true
    - job: "vmtest:aur"
      artifacts: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    - if: $CI_COMMIT_BRANCH
      when: always
    - if: $CI_COMMIT_TAG
      when: always
  script:
    - python3 scripts/ci/lib/verify-matrix.py
        transfer-results install-results test-results
        --md deployment-matrix.md
        --junit verify-junit.xml
        --json deployment-matrix.json
  artifacts:
    when: always
    paths:
      - deployment-matrix.md
      - deployment-matrix.json
    reports:
      junit: verify-junit.xml
    expire_in: 90 days
