      policy: pull-push
  script:
    - apt-get update && apt-get install -y bash git curl wget build-essential file pkg-config
        libssl-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev
        librsvg2-dev libsoup-3.0-dev patchelf python3 ca-certificates
        libvips-dev libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev docker.io
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash - && apt-get install -y nodejs
    - source scripts/ci/lib/install-rust.sh
    - bash scripts/ci/lib/fetch-webclients.sh
    - |
      PATCH_FILE="patches/snap/${DISTRO_PATCH}.patch"
      if [ -f "$PATCH_FILE" ]; then
        git apply --reverse --check "$PATCH_FILE" 2>/dev/null || git apply "$PATCH_FILE"
      else
        echo "WARNING: $PATCH_FILE not found"
      fi
    - scripts/build-webclients.sh
    - VERSION=$(node -p "require('./package.json').version")
    - |
      sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
    - sed -i "0,/^version = \"[^\"]*\"/s//version = \"$VERSION\"/" src-tauri/Cargo.toml
    - npm ci
    - cd src-tauri && cargo build --release && cd ..
    - |
      BUILD_CONTEXT="${CI_PROJECT_DIR}/.snap-build-${CI_JOB_ID}"
      rm -rf "$BUILD_CONTEXT"
      mkdir -p "$BUILD_CONTEXT/packaging/snap" "$BUILD_CONTEXT/src-tauri/target/release" "$BUILD_CONTEXT/src-tauri/icons"
      cp packaging/snap/proton-drive-wrapper.sh "$BUILD_CONTEXT/packaging/snap/"
      cp packaging/snap/com.proton.drive.desktop "$BUILD_CONTEXT/packaging/snap/"
      cp src-tauri/target/release/proton-drive "$BUILD_CONTEXT/src-tauri/target/release/"
      cp src-tauri/icons/32x32.png src-tauri/icons/128x128.png src-tauri/icons/proton-drive.svg "$BUILD_CONTEXT/src-tauri/icons/"
      sed "s/PLACEHOLDER/$VERSION/" packaging/snap/snapcraft.yaml > "$BUILD_CONTEXT/snapcraft.yaml"
      docker run --rm --entrypoint "" \
        -v "$BUILD_CONTEXT":/project -w /project \
        ghcr.io/canonical/snapcraft:stable \
        snapcraft pack --destructive-mode --output /project
      SNAP_FILE="$(find "$BUILD_CONTEXT" -maxdepth 1 -name '*.snap' | head -1)"
      [ -n "$SNAP_FILE" ] || { echo "No snap file found!"; exit 1; }
      mkdir -p artifacts
      mv "$SNAP_FILE" "artifacts/proton-drive_${VERSION}_core24_amd64.snap"
      rm -rf "$BUILD_CONTEXT"
  artifacts:
    paths: [artifacts/]
    expire_in: 30 days

build:snap:core26:
  extends: .rules:build
  stage: build
  image: ubuntu:24.04
  timeout: 2h
  services:
    - docker:dind
  variables:
    DISTRO_PATCH: core26
    DEBIAN_FRONTEND: noninteractive
  cache:
    - key:
        files: [Cargo.lock, src-tauri/Cargo.toml]
        prefix: snap-core26
      paths: [.cargo/, src-tauri/target/]
      when: always
    - key: "webclients-${WEBCLIENTS_COMMIT}"
      paths: [WebClients/]
      policy: pull-push
  allow_failure: true
  script:
    - apt-get update && apt-get install -y bash git curl wget build-essential file pkg-config
        libssl-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev
        librsvg2-dev libsoup-3.0-dev patchelf python3 ca-certificates
        libvips-dev libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev docker.io
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash - && apt-get install -y nodejs
    - source scripts/ci/lib/install-rust.sh
    - bash scripts/ci/lib/fetch-webclients.sh
    - |
      PATCH_FILE="patches/snap/${DISTRO_PATCH}.patch"
      if [ -f "$PATCH_FILE" ]; then
        git apply --reverse --check "$PATCH_FILE" 2>/dev/null || git apply "$PATCH_FILE"
      else
        echo "WARNING: $PATCH_FILE not found"
      fi
    - scripts/build-webclients.sh
    - VERSION=$(node -p "require('./package.json').version")
    - |
      sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
    - sed -i "0,/^version = \"[^\"]*\"/s//version = \"$VERSION\"/" src-tauri/Cargo.toml
    - npm ci
    - cd src-tauri && cargo build --release && cd ..
    - |
      BUILD_CONTEXT="${CI_PROJECT_DIR}/.snap-build-${CI_JOB_ID}"
      rm -rf "$BUILD_CONTEXT"
      mkdir -p "$BUILD_CONTEXT/packaging/snap" "$BUILD_CONTEXT/src-tauri/target/release" "$BUILD_CONTEXT/src-tauri/icons"
      cp packaging/snap/proton-drive-wrapper.sh "$BUILD_CONTEXT/packaging/snap/"
      cp packaging/snap/com.proton.drive.desktop "$BUILD_CONTEXT/packaging/snap/"
      cp src-tauri/target/release/proton-drive "$BUILD_CONTEXT/src-tauri/target/release/"
      cp src-tauri/icons/32x32.png src-tauri/icons/128x128.png src-tauri/icons/proton-drive.svg "$BUILD_CONTEXT/src-tauri/icons/"
      sed "s/PLACEHOLDER/$VERSION/" packaging/snap/snapcraft.yaml | \
        sed -e "s/base: core24/base: core26/" \
            -e "s/grade: stable/grade: devel/" \
            -e "/^base: core26/a\\build-base: devel" > "$BUILD_CONTEXT/snapcraft.yaml"
      docker run --rm --entrypoint "" \
        -v "$BUILD_CONTEXT":/project -w /project \
        ghcr.io/canonical/snapcraft:stable \
        snapcraft pack --destructive-mode --output /project
      SNAP_FILE="$(find "$BUILD_CONTEXT" -maxdepth 1 -name '*.snap' | head -1)"
      [ -n "$SNAP_FILE" ] || { echo "No snap file found!"; exit 1; }
      mkdir -p artifacts
      mv "$SNAP_FILE" "artifacts/proton-drive_${VERSION}_core26_amd64.snap"
      rm -rf "$BUILD_CONTEXT"
  artifacts:
    paths: [artifacts/]
    expire_in: 30 days

# ─── Build gate ────────────────────────────────────────────────────────────────
# Waits for all distro builds that feed into transfer/install/vmtest.
# If any of those builds fails this job is skipped, which cascades:
#   transfer/* (all needs build:gate) → skipped
#   install/*  (needs transfer)       → skipped
#   vmtest/*   (needs install)        → skipped
# Report jobs do NOT need this gate and always run.

build:gate:
  stage: gate
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+.*$/
    - when: never
  needs:
    - "build:apk:alpine-3.20"
    - "build:apk:alpine-3.22"
    - "build:aur"
    - "build:deb:debian-12"
    - "build:deb:debian-13"
    - "build:deb:ubuntu-24.04"
    - "build:deb:ubuntu-26.04"
    - "build:rpm:el10"
    - "build:rpm:fedora-43"
    - "build:rpm:opensuse-tumbleweed"
  script:
    - echo "All distro builds passed — transfer/install/vmtest stages are cleared to run"
