# ─── AppImage ─────────────────────────────────────────────────────────────────

build:appimage:
  extends: .rules:build
  stage: build
  image: debian:12
  timeout: 2h
  variables:
    APPIMAGE_TARGET: linux-baseline
  cache:
    - key:
        files: [Cargo.lock, src-tauri/Cargo.toml]
        prefix: appimage-linux-baseline
      paths: [.cargo/, src-tauri/target/]
      when: always
    - key: "webclients-${WEBCLIENTS_COMMIT}"
      paths: [WebClients/]
      policy: pull-push
  script:
    - apt-get update && apt-get install -y bash git curl wget build-essential file pkg-config
        libssl-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev
        librsvg2-dev libsoup-3.0-dev patchelf fuse libfuse2 python3 ca-certificates
        libvips-dev libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash - && apt-get install -y nodejs
    - source scripts/ci/lib/install-rust.sh
    - bash scripts/ci/lib/fetch-webclients.sh
    - |
      PATCH_FILE="patches/appimage/${APPIMAGE_TARGET}.patch"
      if [ -f "$PATCH_FILE" ]; then
        git apply "$PATCH_FILE"
      else
        echo "ERROR: $PATCH_FILE not found"; exit 1
      fi
    - scripts/build-webclients.sh
    - VERSION=$(node -p "require('./package.json').version")
    - |
      sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
    - sed -i "0,/^version = \"[^\"]*\"/s//version = \"$VERSION\"/" src-tauri/Cargo.toml
    - npm ci
    - cargo build --manifest-path src-tauri/Cargo.toml --release
    - |
      APPDIR="AppDir"
      mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/share/applications" \
        "$APPDIR/usr/share/icons/hicolor/scalable/apps" \
        "$APPDIR/usr/share/icons/hicolor/128x128/apps" \
        "$APPDIR/usr/share/icons/hicolor/32x32/apps" \
        "$APPDIR/usr/share/icons/hicolor/256x256/apps"
      cp src-tauri/target/release/proton-drive "$APPDIR/usr/bin/proton-drive"
      chmod +x "$APPDIR/usr/bin/proton-drive"
      cat > "$APPDIR/usr/share/applications/com.proton.drive.desktop" <<'EOF'
      [Desktop Entry]
      Version=1.0
      Type=Application
      Name=ProtonDrive Linux (Unofficial)
      Comment=Secure cloud storage
      Exec=proton-drive %U
      Icon=com.proton.drive
      Categories=Utility;Network;FileTransfer;
      Terminal=false
      StartupWMClass=proton-drive
      EOF
      cp src-tauri/icons/proton-drive.svg "$APPDIR/usr/share/icons/hicolor/scalable/apps/com.proton.drive.svg"
      cp src-tauri/icons/128x128.png "$APPDIR/usr/share/icons/hicolor/128x128/apps/com.proton.drive.png"
      cp src-tauri/icons/32x32.png "$APPDIR/usr/share/icons/hicolor/32x32/apps/com.proton.drive.png"
      cp src-tauri/icons/128x128@2x.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/com.proton.drive.png"
      cp "$APPDIR/usr/share/applications/com.proton.drive.desktop" "$APPDIR/com.proton.drive.desktop"
      cp src-tauri/icons/proton-drive.svg "$APPDIR/com.proton.drive.svg"
      ln -sf usr/share/icons/hicolor/128x128/apps/com.proton.drive.png "$APPDIR/.DirIcon"
      cat > "$APPDIR/AppRun" <<'APPRUN'
      #!/bin/bash
      export WEBKIT_DISABLE_DMABUF_RENDERER=1
      export WEBKIT_DISABLE_COMPOSITING_MODE=1
      export WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS=1
      export GDK_GL=software
      export GSK_RENDERER=cairo
      HERE="$(dirname "$(readlink -f "${0}")")"
      export PATH="${HERE}/usr/bin:${PATH}"
      export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
      exec "${HERE}/usr/bin/proton-drive" "$@"
      APPRUN
      chmod +x "$APPDIR/AppRun"
      wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
      chmod +x appimagetool
      ./appimagetool --appimage-extract
      ARCH=x86_64 ./squashfs-root/AppRun "$APPDIR" "proton-drive_${VERSION}_${APPIMAGE_TARGET}_amd64.AppImage"
      mkdir -p artifacts
      mv "proton-drive_${VERSION}_${APPIMAGE_TARGET}_amd64.AppImage" artifacts/
  artifacts:
    paths: [artifacts/]
    expire_in: 30 days

# ─── AUR ──────────────────────────────────────────────────────────────────────

build:aur:
  extends: .rules:build
  stage: build
  image: archlinux:base-devel
  timeout: 2h
  cache:
    - key:
        files: [Cargo.lock, src-tauri/Cargo.toml]
        prefix: aur-arch-native
      paths: [.cargo/, src-tauri/target/]
      when: always
    - key: "webclients-${WEBCLIENTS_COMMIT}"
      paths: [WebClients/]
      policy: pull-push
  script:
    - pacman -Sy --noconfirm --needed bash git curl wget file pkg-config
        webkit2gtk-4.1 gtk3 libayatana-appindicator openssl librsvg libsoup3
        nodejs npm python rustup base-devel patch
    - rustup default "${RUST_VERSION}"
    - source scripts/ci/lib/install-rust.sh
    - bash scripts/ci/lib/fetch-webclients.sh
    - |
      AUR_PATCH="patches/aur/arch-native.patch"
      if [ -f "$AUR_PATCH" ]; then
        git apply "$AUR_PATCH"
      else
        echo "ERROR: No AUR patch found at $AUR_PATCH"; exit 1
      fi
    - scripts/build-webclients.sh
    - VERSION=$(node -p "require('./package.json').version")
    - |
      sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
    - sed -i "0,/^version = \"[^\"]*\"/s//version = \"$VERSION\"/" src-tauri/Cargo.toml
    - npm ci
    - cargo build --manifest-path src-tauri/Cargo.toml --release
    - scripts/ci/build/aur-package.sh "arch-native" "$VERSION" "src-tauri/target/release/proton-drive" "src-tauri/icons"
    - |
      cd packaging/aur
      sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
      sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
      makepkg --printsrcinfo > .SRCINFO 2>/dev/null || true
      cd "${CI_PROJECT_DIR}"
    # NOTE: the block above cd's into packaging/aur/; return to project root so
    # artifacts/ is created at the repo root where GitLab collects it.
    - mkdir -p "${CI_PROJECT_DIR}/artifacts"
    - cp /tmp/aur-output/*.pkg.tar.zst "${CI_PROJECT_DIR}/artifacts/"
    - cp packaging/aur/.SRCINFO "${CI_PROJECT_DIR}/artifacts/" 2>/dev/null || true
  artifacts:
    paths: [artifacts/]
    expire_in: 30 days

