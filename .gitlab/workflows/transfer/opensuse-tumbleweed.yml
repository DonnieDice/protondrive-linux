transfer:rpm-opensuse-tumbleweed:
  extends: .transfer:base
  needs:
    - job: "build:rpm:opensuse-tumbleweed"
      artifacts: true
  artifacts:
    name: "transfer-results-rpm-opensuse-tumbleweed"
    paths: [transfer-results/]
    reports:
      dotenv: transfer-results/opensuse-tw.env
    when: always
    expire_in: 30 days
  script:
    - bash scripts/ci/transfer/opensuse-tumbleweed/transfer.sh
