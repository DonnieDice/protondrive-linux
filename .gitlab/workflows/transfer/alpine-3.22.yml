transfer:alpine-3.22:
  extends: .transfer:base
  variables:
    BUILD_JOB_NAME: "build:apk:alpine-3.22"
  needs:
    - job: "build:gate"
    - job: "build:apk:alpine-3.22"
      artifacts: true
      optional: true
  artifacts:
    name: "transfer-results-alpine-3.22"
    paths: [transfer-results/]
    reports:
      dotenv: transfer-results/alpine322.env
    when: always
    expire_in: 30 days
  script:
    - bash scripts/ci/transfer/alpine-3.22/transfer.sh
