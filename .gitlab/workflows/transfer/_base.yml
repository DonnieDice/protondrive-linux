# Shared template for all transfer:* jobs.
# Locates the build artifact and SCPs it to the target VM.
# Emits: transfer-results/<label>.json (result) + transfer-results/<label>.env (dotenv for install stage).

.transfer:base:
  stage: transfer
  image: alpine:latest
  interruptible: true
  before_script:
    - apk add --no-cache bash openssh-client coreutils
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
    - when: manual
      allow_failure: true
