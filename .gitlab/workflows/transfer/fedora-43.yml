transfer:rpm-fedora-43:
  extends: .transfer:base
  needs:
    - job: "build:rpm:fedora-43"
      artifacts: true
  artifacts:
    name: "transfer-results-rpm-fedora-43"
    paths: [transfer-results/]
    reports:
      dotenv: transfer-results/fedora43.env
    when: always
    expire_in: 30 days
  script:
    - bash scripts/ci/transfer/fedora-43/transfer.sh
