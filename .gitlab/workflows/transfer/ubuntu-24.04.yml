transfer:ubuntu-24.04:
  extends: .transfer:base
  variables:
    BUILD_JOB_NAME: "build:deb:ubuntu-24.04"
  needs:
    - job: "build:gate"
    - job: "build:deb:ubuntu-24.04"
      artifacts: true
      optional: true
  artifacts:
    name: "transfer-results-ubuntu-24.04"
    paths: [transfer-results/]
    reports:
      dotenv: transfer-results/ubuntu24.04.env
    when: always
    expire_in: 30 days
  script:
    - bash scripts/ci/transfer/ubuntu-24.04/transfer.sh
