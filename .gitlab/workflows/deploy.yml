# ─── Verify: install built packages on real target VMs + smoke test ──────────
#
# Each job pulls one distro's package from its build job and runs
# scripts/ci/deploy-and-test-vm.sh, which SSHes to the matching VM, installs
# the package with the native package manager, and confirms the binary runs.
#
# PREREQUISITES (set once in GitLab → Settings → CI/CD → Variables):
#   VM_SSH_KEY   (file)     private SSH key authorized as root on every test VM
#   VM_SSH_USER  (optional) defaults to "root"
#
# The runner must have network reachability to the 192.168.1.0/24 VM subnet
# (the shared gitlab-runner on tower does, being on the same bridge).

.verify:base:
  stage: verify
  image: alpine:latest
  interruptible: true
  # No tags: runs on the default shared runner. Its docker-executor job
  # containers reach the 192.168.1.0/24 VM subnet via the host's routing.
  # If your runner only accepts tagged jobs, add the appropriate tag here.
  before_script:
    - apk add --no-cache bash openssh-client coreutils
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
    - when: manual
      allow_failure: true

verify:alpine-3.20:
  extends: .verify:base
  needs: ["build:apk:alpine-3.20"]
  script: ["bash scripts/ci/deploy-and-test-vm.sh alpine320"]

verify:alpine-3.22:
  extends: .verify:base
  needs: ["build:apk:alpine-3.22"]
