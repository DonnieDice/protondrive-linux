install:rpm-el10:
  extends: .install:base
  needs:
    - job: "transfer:rpm-el10"
      artifacts: true
  artifacts:
    name: "install-results-rpm-el10"
    paths:
      - transfer-results/
      - install-results/
    when: always
    expire_in: 30 days
  script:
    - bash scripts/ci/install/el10/install.sh
