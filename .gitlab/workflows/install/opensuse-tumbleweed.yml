install:rpm-opensuse-tumbleweed:
  extends: .install:base
  needs:
    - job: "transfer:rpm-opensuse-tumbleweed"
      artifacts: true
  artifacts:
    name: "install-results-rpm-opensuse-tumbleweed"
    paths:
      - transfer-results/
      - install-results/
    when: always
    expire_in: 30 days
  script:
    - bash scripts/ci/install/opensuse-tumbleweed/install.sh
