install:debian-13:
  extends: .install:base
  needs:
    - job: "transfer:debian-13"
      artifacts: true
  artifacts:
    name: "install-results-debian-13"
    paths:
      - transfer-results/
      - install-results/
    when: always
    expire_in: 30 days
  script:
    - bash scripts/ci/install/debian-13/install.sh
