install:rpm-fedora-43:
  extends: .install:base
  needs:
    - job: "transfer:rpm-fedora-43"
      artifacts: true
  artifacts:
    name: "install-results-rpm-fedora-43"
    paths:
      - transfer-results/
      - install-results/
    when: always
    expire_in: 30 days
  script:
    - bash scripts/ci/install/fedora-43/install.sh
