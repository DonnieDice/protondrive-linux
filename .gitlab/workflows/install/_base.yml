# Shared template for all install:* jobs.
# Installs the package on the VM using the distro-specific package manager.
# Reads REMOTE_PKG_PATH from the transfer stage dotenv artifact.
# Re-exports transfer-results/ so the report stage can aggregate all three result sets.

.install:base:
  stage: install
  image: alpine:latest
  interruptible: true
  before_script:
    - apk add --no-cache bash openssh-client coreutils
  rules:
    # Transfer/install/vmtest consume release build artifacts, so they only run
    # for protected version tag pipelines.
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+.*$/
    - when: never
