install:ubuntu-26.04:
  extends: .install:base
  needs:
    - job: "transfer:ubuntu-26.04"
      artifacts: true
  artifacts:
    name: "install-results-ubuntu-26.04"
    paths:
      - transfer-results/
      - install-results/
    when: always
    expire_in: 30 days
  script:
    - bash scripts/ci/install/ubuntu-26.04/install.sh
