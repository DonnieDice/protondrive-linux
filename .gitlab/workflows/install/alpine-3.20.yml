install:alpine-3.20:
  extends: .install:base
  needs:
    - job: "transfer:alpine-3.20"
      artifacts: true
  artifacts:
    name: "install-results-alpine-3.20"
    paths:
      - transfer-results/
      - install-results/
    when: always
    expire_in: 30 days
  script:
    - bash scripts/ci/install/alpine-3.20/install.sh
