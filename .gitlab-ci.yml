# ─── Flatpak ──────────────────────────────────────────────────────────────────
# NOTE: flatpak-builder requires either --disable-rofiles-fuse or privileged mode.
# If builds fail with FUSE errors, enable privileged mode in the runner config.

build:flatpak:gnome-49:
  extends: .rules:build
  stage: build
  image: ubuntu:24.04
  timeout: 2h
  variables:
    DISTRO_PATCH: org.gnome.Platform.49
    GNOME_RUNTIME: "49"
    DEBIAN_FRONTEND: noninteractive
  cache:
    key: flatpak-gnome49-cargo
    paths: [.cargo/, src-tauri/target/]
    when: always
  script:
    - apt-get update && apt-get install -y bash git curl wget build-essential file pkg-config
        libssl-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev
        librsvg2-dev libsoup-3.0-dev patchelf python3 ca-certificates
        libvips-dev libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev
        flatpak flatpak-builder
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash - && apt-get install -y nodejs
    - *install_rust
    - *clone_webclients
    - |
      PATCH_FILE="patches/flatpak/${DISTRO_PATCH}.patch"
      if [ -f "$PATCH_FILE" ]; then
        git apply --check "$PATCH_FILE" 2>/dev/null && git apply "$PATCH_FILE" || echo "WARNING: patch $PATCH_FILE has conflicts, continuing without it"
      else
        echo "WARNING: $PATCH_FILE not found"
      fi
    - scripts/build-webclients.sh
    - VERSION=$(node -p "require('./package.json').version")
    - |
      sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
    - sed -i "0,/^version = \"[^\"]*\"/s//version = \"$VERSION\"/" src-tauri/Cargo.toml
    - npm ci
    - cd src-tauri && cargo build --release && cd ..
    - |
      flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
      flatpak install --user -y flathub org.gnome.Platform//${GNOME_RUNTIME} org.gnome.Sdk//${GNOME_RUNTIME} || true
      printf '%s\n' '#!/bin/bash' \
        'export WEBKIT_DISABLE_DMABUF_RENDERER=1' \
        'export WEBKIT_DISABLE_COMPOSITING_MODE=1' \
        'export WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS=1' \
        'export GDK_GL=software' \
        'exec /app/bin/proton-drive-bin "$@"' > proton-drive-wrapper.sh
      chmod +x proton-drive-wrapper.sh
      printf '%s\n' '[Desktop Entry]' 'Version=1.0' 'Type=Application' \
        'Name=ProtonDrive Linux (Unofficial)' 'Comment=Secure cloud storage' \
        'Exec=proton-drive' 'Icon=com.proton.drive' 'Categories=Network;FileTransfer;' \
        > com.proton.drive.desktop
      rm -rf flatpak-staging && mkdir -p flatpak-staging/icons
      cp src-tauri/target/release/proton-drive flatpak-staging/proton-drive-bin
      cp proton-drive-wrapper.sh flatpak-staging/proton-drive
      cp src-tauri/icons/32x32.png src-tauri/icons/128x128.png \
         src-tauri/icons/128x128@2x.png src-tauri/icons/proton-drive.svg flatpak-staging/icons/
      cp com.proton.drive.desktop flatpak-staging/
      cp packaging/com.proton.drive.metainfo.xml flatpak-staging/
      cat > com.proton.drive.yml <<YAMLEOF
      app-id: com.proton.drive
      runtime: org.gnome.Platform
      runtime-version: '${GNOME_RUNTIME}'
      sdk: org.gnome.Sdk
      command: proton-drive
      finish-args:
        - --share=network
        - --share=ipc
        - --socket=fallback-x11
        - --socket=wayland
        - --socket=pulseaudio
        - --device=dri
        - --filesystem=xdg-download
        - --filesystem=xdg-documents
        - --talk-name=org.freedesktop.secrets
        - --talk-name=org.freedesktop.Notifications
      modules:
      - name: proton-drive
        buildsystem: simple
        sources:
        - type: dir
          path: flatpak-staging
        build-commands:
        - install -Dm755 proton-drive-bin /app/bin/proton-drive-bin
        - install -Dm755 proton-drive /app/bin/proton-drive
        - install -Dm644 icons/32x32.png /app/share/icons/hicolor/32x32/apps/com.proton.drive.png
        - install -Dm644 icons/128x128.png /app/share/icons/hicolor/128x128/apps/com.proton.drive.png
        - install -Dm644 icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/com.proton.drive.png
        - install -Dm644 icons/proton-drive.svg /app/share/icons/hicolor/scalable/apps/com.proton.drive.svg
        - install -Dm644 com.proton.drive.desktop /app/share/applications/com.proton.drive.desktop
        - install -Dm644 com.proton.drive.metainfo.xml /app/share/metainfo/com.proton.drive.metainfo.xml
      YAMLEOF
      rm -rf build-dir repo
      flatpak-builder --user --force-clean --repo=repo --disable-rofiles-fuse build-dir com.proton.drive.yml
      flatpak build-bundle repo "proton-drive_${VERSION}_gnome${GNOME_RUNTIME}.flatpak" com.proton.drive
      mkdir -p artifacts && mv *.flatpak artifacts/
  artifacts:
    paths: [artifacts/]
    expire_in: 30 days

