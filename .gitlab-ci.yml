build:rpm:el10:
  extends: .rules:build
  stage: build
  image: quay.io/centos/centos:stream10
  timeout: 2h
  variables:
    DISTRO_PATCH: el10
  cache:
    key: rpm-el10-cargo
    paths: [.cargo/, src-tauri/target/]
    when: always
  script:
    - dnf install -y epel-release || true
    - dnf install -y 'dnf-command(config-manager)' || true
    - dnf config-manager --set-enabled crb || true
    - dnf --enablerepo=epel install -y bash git curl wget gcc gcc-c++ make file
        pkgconf-pkg-config openssl-devel gtk3-devel libappindicator-gtk3-devel
        librsvg2-devel libsoup3-devel webkit2gtk4.1-devel patchelf rpm-build
        nodejs npm python3 findutils which
    - *install_rust
    - git clone --depth=1 --single-branch --branch "${WEBCLIENTS_REF}" https://github.com/ProtonMail/WebClients.git WebClients
    - |
      PATCH_FILE="patches/rpm/${DISTRO_PATCH}.patch"
      if [ -f "$PATCH_FILE" ]; then
        git apply --reverse --check "$PATCH_FILE" 2>/dev/null || git apply "$PATCH_FILE"
      else
        echo "WARNING: $PATCH_FILE not found"
      fi
    - scripts/build-webclients.sh
    - VERSION=$(node -p "require('./package.json').version")
    - |
      sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
    - sed -i "0,/^version = \"[^\"]*\"/s//version = \"$VERSION\"/" src-tauri/Cargo.toml
    - npm install
    - npx tauri build --bundles rpm --verbose
    - |
      cd src-tauri/target/release/bundle/rpm
      shopt -s nullglob
      for file in Proton\ Drive*.rpm; do mv "$file" "${file/Proton Drive/proton-drive}"; done
      cd "${CI_PROJECT_DIR}"
    - mkdir -p artifacts && cp src-tauri/target/release/bundle/rpm/*.rpm artifacts/
  artifacts:
    paths: [artifacts/]
    expire_in: 30 days

