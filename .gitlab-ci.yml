      docker run --rm --entrypoint "" \
        -v "$BUILD_CONTEXT":/project -w /project \
        ghcr.io/canonical/snapcraft:8_core24 \
        snapcraft pack --destructive-mode --output /project
      SNAP_FILE="$(find "$BUILD_CONTEXT" -maxdepth 1 -name '*.snap' | head -1)"
      [ -n "$SNAP_FILE" ] || { echo "No snap file found!"; exit 1; }
      mkdir -p artifacts
      mv "$SNAP_FILE" "artifacts/proton-drive_${VERSION}_core26_amd64.snap"
      rm -rf "$BUILD_CONTEXT"
