build:apk:alpine-3.23:
  extends: .rules:build
  stage: build
  image: alpine:3.23
  timeout: 2h
  variables:
    DISTRO_TYPE: apk
    DISTRO_PATCH: alpine.3.23
    DISTRO_SUFFIX: alpine323
  cache:
