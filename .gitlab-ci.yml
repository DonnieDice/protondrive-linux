include:
  - local: .gitlab/workflows/_shared.yml
  - local: .gitlab/workflows/tests.yml
  - local: .gitlab/workflows/builds.yml
  - local: .gitlab/workflows/release.yml

stages:
  - test
  - build
  - spec
  - release
  - publish

workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
