          pkgconf-pkg-config libopenssl-devel gtk3-devel \
          libappindicator3-devel libayatana-appindicator3-devel \
          librsvg-devel libsoup-devel webkitgtk3-devel libwebkit2gtk-4_1-0 \
          patchelf rpm-build nodejs-default npm-default python313 findutils which && break
        echo "zypper install failed, retrying ($i/3)..."; sleep $((i * 10))
      done
    - *install_rust
    - git clone --depth=1 --single-branch --branch "${WEBCLIENTS_REF}" https://github.com/ProtonMail/WebClients.git WebClients
