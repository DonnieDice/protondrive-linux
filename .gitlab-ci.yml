include:
  - local: .gitlab-ci-vm-tests.yml
  - local: .gitlab/workflows/tests.yml

variables:
  RUST_VERSION: stable
  WEBCLIENTS_REF: main
  WEBCLIENTS_COMMIT: "bbad1a0a482227b93a2e963a232463aede9b8abf"
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOC_AUDIT_WINDOW_HOURS: "24"

stages:
  - detect
  - audit
  - update
  - lint
  - test
  - security
  - build
  - spec
  - sign
  - smoke
  - release
  - publish
  - mirror

workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    # MR and branch pipelines run quality gates. Package release builds are
    # created by protected v* tags; manual/API release-test runs are explicit.
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+.*$/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: '$CI_PIPELINE_SOURCE == "web" && $RUN_RELEASE_TESTS == "true"'
    - if: '$CI_PIPELINE_SOURCE == "api" && $RUN_RELEASE_TESTS == "true"'
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $RUN_DOC_AUDIT == "true"'
    - if: '$CI_PIPELINE_SOURCE == "web" && $RUN_DOC_AUDIT == "true"'
    - if: '$CI_PIPELINE_SOURCE == "api" && $RUN_DOC_AUDIT == "true"'
    - when: never
.rules:build:
  rules:
    - if: $CI_COMMIT_TAG
    - if: '$CI_PIPELINE_SOURCE == "web" && $RUN_RELEASE_TESTS == "true"'
    - if: '$CI_PIPELINE_SOURCE == "api" && $RUN_RELEASE_TESTS == "true"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
    - if: $CI_COMMIT_BRANCH
      when: manual
      allow_failure: true
    - when: manual
      allow_failure: true

.rules:release:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$/
    - when: never

.rules:publish:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
    - when: manual
      allow_failure: true

.rules:doc_audit:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $RUN_DOC_AUDIT == "true"'
    - if: '$CI_PIPELINE_SOURCE == "web" && $RUN_DOC_AUDIT == "true"'
    - if: '$CI_PIPELINE_SOURCE == "api" && $RUN_DOC_AUDIT == "true"'
    - when: never

.rules:gate:
  interruptible: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
    - when: never

.rules:test:
  extends: .rules:gate

lint:shell:
  extends: .rules:gate
  stage: lint
  image:
    name: koalaman/shellcheck-alpine:stable
    entrypoint: [""]
  dependencies: []
  cache: []
  allow_failure: true
  before_script:
    - apk add --no-cache bash git
  script:
    - shellcheck --severity=error $(git ls-files '*.sh')

lint:shell-fmt:
  extends: .rules:gate
  stage: lint
  image: alpine:3.20
  dependencies: []
  cache: []
  allow_failure: true
  before_script:
    - apk add --no-cache git shfmt
  script:
    - FILES="$(git ls-files '*.sh')"
    - 'test -n "$FILES" && shfmt -d -i 2 -ci $FILES || echo "no shell files"'

lint:yaml:
  extends: .rules:gate
  stage: lint
  image: alpine:3.20
  dependencies: []
  cache: []
  allow_failure: true
  before_script:
    - apk add --no-cache yamllint
  script:
    - yamllint -s . || true

lint:actions:
  extends: .rules:gate
  stage: lint
  image: alpine:3.20
  dependencies: []
  cache: []
  allow_failure: true
  before_script:
    - apk add --no-cache go git
    - GOBIN=/usr/local/bin go install github.com/rhysd/actionlint/cmd/actionlint@latest 2>/dev/null || apk add --no-cache actionlint 2>/dev/null || true
  script:
    - actionlint

lint:gitlab-ci:
  extends: .rules:gate
  stage: lint
  image: alpine:3.20
  dependencies: []
  cache: []
  rules:
    - if: '$CI_LINT_TOKEN && $CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - .gitlab-ci.yml
        - .gitlab/workflows/*.yml
    - when: never
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      RESP=$(curl -sk --header "PRIVATE-TOKEN: ${CI_LINT_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/ci/lint" \
        --data-urlencode "content=$(cat .gitlab-ci.yml)")
      echo "$RESP" | jq -e '.valid == true' >/dev/null || { echo "$RESP" | jq .; exit 1; }

lint:python:
  extends: .rules:gate
  stage: lint
  image: python:3.12-slim
  dependencies: []
  cache: []
  allow_failure: true
  before_script:
    - pip install --no-cache-dir ruff
  script:
    - ruff check scripts/ || true
    - ruff format --check scripts/ || true

test:python-scripts:
  extends: .rules:gate
  stage: test
  image: python:3.12-slim
  allow_failure: true
  dependencies: []
  cache: []
  script:
    - python -c "import ast, pathlib; [ast.parse(p.read_text(encoding='utf-8')) for p in pathlib.Path('scripts').rglob('*.py')]"
    - if [ -d scripts/tests ]; then python -m pip install --no-cache-dir pytest && pytest -q scripts/tests; else echo "no scripts/tests yet"; fi

test:version-consistency:
  extends: .rules:gate
  stage: test
  image: alpine:3.20
  allow_failure: true
  dependencies: []
  cache: []
  before_script:
    - apk add --no-cache jq grep sed gawk bash
  script:
    - bash scripts/ci/check-versions.sh

coverage:rust:
  extends: .rules:gate
  stage: test
  image: debian:12
  timeout: 40m
  allow_failure: true
  dependencies: []
  variables:
    CARGO_HOME: "${CI_PROJECT_DIR}/.cargo-cov"
  cache:
    key: cov-rust-cargo
    paths: [.cargo-cov/, src-tauri/target/]
    when: always
  before_script:
    - apt-get update && apt-get install -y bash curl git wget build-essential pkg-config
        libssl-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev
        librsvg2-dev libsoup-3.0-dev
    - source scripts/ci/lib/install-rust.sh
    - rustup component add llvm-tools-preview
    - cargo install cargo-llvm-cov --locked || true
  script:
    - mkdir -p WebClients/applications/drive/dist
    - printf '<!doctype html><html><body>coverage fixture</body></html>\n' > WebClients/applications/drive/dist/index.html
    - cargo llvm-cov --manifest-path src-tauri/Cargo.toml --cobertura --output-path coverage.xml --summary-only
  coverage: '/TOTAL.*?(\d+\.\d+)%/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml

security:secrets:
  extends: .rules:gate
  stage: security
  image: alpine:3.20
  allow_failure: true
  dependencies: []
  cache: []
  before_script:
    - apk add --no-cache git curl
    - curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar xz -C /usr/local/bin gitleaks
  script:
    - gitleaks detect --source . --redact -v --exit-code 1

security:cargo-deny:
  extends: .rules:gate
  stage: security
  image: rust:bookworm
  dependencies: []
  cache:
    key: security-cargo-deny
    paths: [.cargo/, src-tauri/target/]
    when: always
  allow_failure: true
  variables:
    CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  script:
    - cargo install cargo-deny --locked || true
    - cargo deny --manifest-path src-tauri/Cargo.toml check advisories bans licenses sources

security:npm-audit:
  extends: .rules:gate
  stage: security
  image: node:22-slim
  dependencies: []
  cache: []
  allow_failure: true
  script:
    - npm ci --ignore-scripts
    - npm audit --audit-level=high

security:trivy-fs:
  extends: .rules:gate
  stage: security
  image: alpine:3.20
  dependencies: []
  cache: []
  allow_failure: true
  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  script:
    - trivy fs --scanners vuln,secret,misconfig --severity HIGH,CRITICAL --exit-code 0 .

docs:detect-changes:
  extends: .rules:doc_audit
  stage: detect
  image: alpine:3.20
  before_script:
    - apk add --no-cache git
  script:
    - |
      if [ "$CI_PIPELINE_SOURCE" = "schedule" ]; then
        git log --since="${DOC_AUDIT_WINDOW_HOURS:-24} hours ago" --name-only --pretty=format: |
          sort -u |
          grep -v '^$' > changed_files.txt
      else
        BASE_SHA="${CI_MERGE_REQUEST_TARGET_BRANCH_SHA:-${CI_COMMIT_BEFORE_SHA:-}}"
        if [ -z "$BASE_SHA" ] || echo "$BASE_SHA" | grep -Eq '^0+$'; then
          BASE_SHA="$(git rev-parse HEAD~1 2>/dev/null || true)"
        fi
        if [ -n "$BASE_SHA" ]; then
          git diff --name-only "$BASE_SHA".."$CI_COMMIT_SHA" > changed_files.txt
        else
          git diff --name-only HEAD~1..HEAD > changed_files.txt
        fi
      fi
      cat changed_files.txt
  artifacts:
    when: always
    paths:
      - changed_files.txt

docs:resolve-mapping:
  extends: .rules:doc_audit
  stage: detect
  image: python:3.12-alpine
  needs:
    - job: docs:detect-changes
      artifacts: true
  before_script:
    - pip install pyyaml
  script:
    - python scripts/ci/resolve-mapping.py --mapping docs/mapping.yaml --changed changed_files.txt > docs/affected_docs.json
    - cat docs/affected_docs.json
  artifacts:
    when: always
    paths:
      - docs/affected_docs.json

docs:audit-gate:
  extends: .rules:doc_audit
  stage: audit
  image: alpine:3.20
  needs:
    - job: docs:detect-changes
      artifacts: true
    - job: docs:resolve-mapping
      artifacts: true
  before_script:
    - apk add --no-cache bash curl git jq
  script:
    - export AFFECTED_JSON="docs/affected_docs.json"
    - |
      if [ "$CI_PIPELINE_SOURCE" = "schedule" ]; then
        export MODE="schedule"
        export DIFFS="$(git log --since="${DOC_AUDIT_WINDOW_HOURS:-24} hours ago" --patch --pretty=short -- $(cat changed_files.txt) || true)"
      else
        export MODE="${DOC_AUDIT_MODE:-release_gate}"
        BASE_SHA="${CI_MERGE_REQUEST_TARGET_BRANCH_SHA:-${CI_COMMIT_BEFORE_SHA:-}}"
        if [ -z "$BASE_SHA" ] || echo "$BASE_SHA" | grep -Eq '^0+$'; then
          BASE_SHA="$(git rev-parse HEAD~1 2>/dev/null || true)"
        fi
        export DIFFS="$(git diff "$BASE_SHA".."$CI_COMMIT_SHA" -- $(cat changed_files.txt) || true)"
      fi
    - bash scripts/ci/ai-doc-gate.sh
  artifacts:
    when: always
    paths:
      - docs/stale_docs.json
      - docs/stale_docs.raw.json

docs:auto-update:
  extends: .rules:doc_audit
  stage: update
  image: alpine:3.20
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $RUN_DOC_AUDIT == "true"'
    - if: '$CI_PIPELINE_SOURCE == "web" && $RUN_DOC_AUDIT == "true"'
      when: manual
      allow_failure: true
    - if: '$CI_PIPELINE_SOURCE == "api" && $RUN_DOC_AUDIT == "true"'
      when: manual
      allow_failure: true
    - when: never
  needs:
    - job: docs:detect-changes
      artifacts: true
    - job: docs:resolve-mapping
      artifacts: true
    - job: docs:audit-gate
      artifacts: true
  before_script:
    - apk add --no-cache bash curl git jq python3
  script:
    - 'export AFFECTED_JSON="docs/affected_docs.json"'
    - 'if [ "$CI_PIPELINE_SOURCE" = "schedule" ]; then export DIFFS="$(git log --since="${DOC_AUDIT_WINDOW_HOURS:-24} hours ago" --patch --pretty=short -- $(cat changed_files.txt) || true)"; else BASE_SHA="${CI_MERGE_REQUEST_TARGET_BRANCH_SHA:-${CI_COMMIT_BEFORE_SHA:-}}"; if [ -z "$BASE_SHA" ] || echo "$BASE_SHA" | grep -Eq "^0+$"; then BASE_SHA="$(git rev-parse HEAD~1 2>/dev/null || true)"; fi; export DIFFS="$(git diff "$BASE_SHA".."$CI_COMMIT_SHA" -- $(cat changed_files.txt) || true)"; fi'
    - bash scripts/ci/ai-doc-update.sh
    - 'if git diff --quiet docs/ README.md; then echo "No doc changes needed."; exit 0; fi'
    - 'BRANCH="docs/ai-update-${CI_COMMIT_SHORT_SHA}"'
    - 'git config user.name "${DOC_AUDIT_BOT_NAME:-doc-audit-bot}"'
    - 'git config user.email "${DOC_AUDIT_BOT_EMAIL:-bot@example.com}"'
    - 'git checkout -b "$BRANCH"'
    - 'git add docs/ README.md'
    - 'git commit -m "docs: auto-update from AI audit [skip ci]"'
    - 'if [ -n "${DOC_AUDIT_PUSH_TOKEN:-}" ]; then git remote set-url origin "https://oauth2:${DOC_AUDIT_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"; fi; git push -o merge_request.create -o merge_request.target=main -o merge_request.title="docs: AI audit update" origin "$BRANCH"'

# ─── Rust install script (reused via YAML anchor) ─────────────────────────────

.install_rust: &install_rust |
  export PATH="$CARGO_HOME/bin:$PATH"
  if [ ! -f "$CARGO_HOME/bin/rustup" ]; then
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
      sh -s -- -y --default-toolchain "${RUST_VERSION}" --no-modify-path
  else
    rustup default "${RUST_VERSION}" 2>/dev/null || rustup default stable
  fi
  export PATH="$CARGO_HOME/bin:$PATH"
  rustc --version && cargo --version

.clone_webclients: &clone_webclients |
  if [ -d "WebClients/.git" ]; then
    echo "✅ WebClients already cloned – resetting to ${WEBCLIENTS_REF}"
    cd WebClients && git fetch origin "${WEBCLIENTS_REF}" && git checkout "origin/${WEBCLIENTS_REF}" && git clean -fd && cd ..
  else
    rm -rf WebClients
    git clone --depth=1 --single-branch --branch "${WEBCLIENTS_REF}" https://github.com/ProtonMail/WebClients.git WebClients
  fi

# ─── APK ──────────────────────────────────────────────────────────────────────

build:apk:alpine-3.20:
  extends: .rules:build
  stage: build
  image: alpine:3.20
  timeout: 2h
  variables:
    DISTRO_TYPE: apk
    DISTRO_PATCH: alpine.3.20
    DISTRO_SUFFIX: alpine320
  cache:
    key: apk-alpine320-cargo
    paths: [.cargo/, src-tauri/target/]
    when: always
  script:
    - apk update && apk add bash git curl wget build-base file pkgconfig
        openssl-dev openssl-libs-static webkit2gtk-4.1-dev gtk+3.0-dev
        glib-dev gdk-pixbuf-dev harfbuzz-dev pango-dev cairo-dev
        wayland-dev zlib-dev libintl musl-dev libsoup3-dev
        libayatana-appindicator-dev patchelf nodejs npm python3 ca-certificates
        vips-dev libjpeg-turbo-dev giflib-dev
    - *install_rust
    - |
      mkdir -p .cargo
      cat > .cargo/config.toml <<'EOF'
      [target.x86_64-unknown-linux-musl]
      linker = "gcc"
      rustflags = ["-C", "target-feature=-crt-static"]
      EOF
    - *clone_webclients
    - |
      PATCH_FILE="patches/apk/${DISTRO_PATCH}.patch"
      if [ -f "$PATCH_FILE" ]; then
        git apply --check "$PATCH_FILE" 2>/dev/null && git apply "$PATCH_FILE" || echo "WARNING: patch $PATCH_FILE has conflicts, continuing without it"
      else
        echo "WARNING: $PATCH_FILE not found"
      fi
    - export PKG_CONFIG_ALLOW_CROSS=1 PKG_CONFIG_PATH="/usr/lib/pkgconfig:/usr/share/pkgconfig"
    - scripts/build-webclients.sh
    - VERSION=$(node -p "require('./package.json').version")
    - |
      sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
    - sed -i "0,/^version = \"[^\"]*\"/s//version = \"$VERSION\"/" src-tauri/Cargo.toml
    - npm ci
    - cd src-tauri && cargo build --release --verbose && cd ..
    - |
      VERSION=$(node -p "require('./package.json').version")
      BINARY=src-tauri/target/release/proton-drive
      [ -f "$BINARY" ] || { echo "ERROR: binary not found"; exit 1; }
      APK_STAGING="/tmp/proton-drive-apk"
      rm -rf "$APK_STAGING"
      mkdir -p "$APK_STAGING/usr/bin" "$APK_STAGING/usr/share/applications" \
        "$APK_STAGING/usr/share/icons/hicolor/32x32/apps" \
        "$APK_STAGING/usr/share/icons/hicolor/128x128/apps" \
        "$APK_STAGING/usr/share/icons/hicolor/128x128@2/apps" \
        "$APK_STAGING/usr/share/icons/hicolor/scalable/apps"
      cp "$BINARY" "$APK_STAGING/usr/bin/proton-drive"
      strip "$APK_STAGING/usr/bin/proton-drive" 2>/dev/null || true
      cp src-tauri/linux/proton-drive.desktop "$APK_STAGING/usr/share/applications/"
      cp src-tauri/icons/32x32.png "$APK_STAGING/usr/share/icons/hicolor/32x32/apps/proton-drive.png"
      cp src-tauri/icons/128x128.png "$APK_STAGING/usr/share/icons/hicolor/128x128/apps/proton-drive.png"
      cp src-tauri/icons/128x128@2x.png "$APK_STAGING/usr/share/icons/hicolor/128x128@2/apps/proton-drive.png"
      cp src-tauri/icons/proton-drive.svg "$APK_STAGING/usr/share/icons/hicolor/scalable/apps/proton-drive.svg"
      mkdir -p artifacts
      tar -C "$APK_STAGING" -czf "artifacts/proton-drive_${VERSION}_${DISTRO_SUFFIX}_amd64.apk.tar.gz" .
  artifacts:
    paths: [artifacts/]
    expire_in: 30 days

