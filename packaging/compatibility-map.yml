roadmap:
  aur:
    arch_native:
      status: roadmap
      gates:
        glibc: pass
        webkitgtk: pass
      packaging_mode: native
      workflow: null
      build_container: archlinux:base-devel
      release_label: aur-arch-native
      artifact_name: aur-arch-native
      patch: arch-native
      supports:
      - arch
      - manjaro
      - endeavour
      - garuda
      replaces: arch
      before_release_gate:
      - design native PKGBUILD that compiles against system WebKitGTK
      - add CI workflow for native AUR build
      - create arch-native patch
      - validate runtime install and login smoke test on Arch
      - plan migration from appimage-wrapper to native AUR
  nix:
    nixos:
      status: roadmap
      gates:
        glibc: nix-managed
        webkitgtk: pass
      workflow: null
      build_container: null
      release_label: nix-flake
      artifact_name: nix-flake
      patch: nix/flake
      supports:
      - nixos
      - any-host-with-nix
      before_release_gate:
      - design flake.nix and associated nix expressions
      - add CI workflow using nix build
      - validate runtime install and login smoke test on NixOS
  gentoo:
    current:
      status: roadmap
      gates:
        glibc: pass
        webkitgtk: pass
      workflow: null
      build_container: gentoo/stage3
      release_label: gentoo
      artifact_name: gentoo-ebuild
      patch: gentoo/ebuild
      supports:
      - gentoo-current
      before_release_gate:
      - design ebuild
      - add CI workflow using gentoo stage3 container
      - validate runtime install and login smoke test on Gentoo
  slackware:
    current:
      status: roadmap
      gates:
        glibc: pass
        webkitgtk: verify
      workflow: null
      build_container: vbatts/slackware
      release_label: slackware
      artifact_name: slackware-package
      patch: slackware/slackware.current
      supports:
      - slackware-current
      before_release_gate:
      - verify WebKitGTK 4.1 availability in Slackware current repos
      - design Slackware package format and build script
      - add CI workflow
      - validate runtime install and login smoke test on Slackware

legacy_candidates:
  deb:
    ubuntu22.04:
      status: verify-first
      gates:
        glibc: pass
        webkitgtk: unverified
      reason: "glibc 2.35 passes; WebKitGTK 4.1 availability in Jammy repos or backports must be verified before adding a DEB target."
  rpm:
    el9:
      status: verify-first
      gates:
        glibc: pass
        webkitgtk: unverified
      reason: "glibc 2.34 passes; WebKitGTK 4.1 availability in EPEL or target repos must be verified before adding an EL9 RPM workflow."
  snap:
    core22:
      status: verify-first
      gates:
        glibc: runtime
        webkitgtk: unverified
      reason: "glibc is provided by core22 runtime; WebKitGTK 4.1 stage packages and desktop extension behavior must be verified before adding a core22 Snap."

not_primary:
  deb:
    ubuntu20.04:
      status: not-primary
      gates:
        glibc: fail
        webkitgtk: fail
      reason: "Both gates fail. glibc 2.31 is below the 2.35 minimum and WebKitGTK 4.1 is not available."
    debian11:
      status: not-primary
      gates:
        glibc: fail
        webkitgtk: fail
      reason: "Both gates fail. glibc 2.31 is below the 2.35 minimum and WebKitGTK 4.1 is not available."
  rpm:
    el8:
      status: not-primary
      gates:
        glibc: fail
        webkitgtk: fail
      reason: "Both gates fail. glibc 2.28 is below the 2.35 minimum and WebKitGTK 4.1 is not available."
  apk:
    alpine320:
      status: not-primary
      gates:
        glibc: musl-pass
        webkitgtk: fail
      reason: "musl passes but WebKitGTK 4.1 is not available in Alpine 3.20 repos. Past listed Alpine support as of the 2026-05-15 baseline check."

architectures:
  release_gate:
  - x86_64
  planned:
  - aarch64
  legacy:
  - armv7
  - x86
  experimental:
  - riscv64

architecture_details:
  x86_64:
    status: release-gated
    notes: "current artifact architecture"
  aarch64:
    status: roadmap
    notes: "next practical architecture for AppImage, DEB, RPM, Flatpak, Snap, and AUR"
  armv7:
    status: legacy
    notes: "32-bit ARM including RPi 2/3; WebKitGTK 4.1 cross-compilation and runtime on armv7 must be verified before any workflow is added; users can use AppImage if glibc permits"
  x86:
    status: legacy
    notes: "32-bit x86; no native packages planned; users can use AppImage if glibc permits"
  riscv64:
    status: experimental
    notes: "requires separate build/test work"
