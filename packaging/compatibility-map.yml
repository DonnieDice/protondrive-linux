webkitgtk_runtime:
  deb: libwebkit2gtk-4.1-0
  rpm: webkit2gtk4.1
  arch: webkit2gtk-4.1
  build_deb: libwebkit2gtk-4.1-dev
  build_rpm: webkit2gtk4.1-devel

ci_workflows:
  generate_package_specs: .github/workflows/generate-package-specs.yml
  release: .github/workflows/release.yml
  publish_aur: .github/workflows/publish-aur.yml

rpm:
  fedora43:
    workflow: .github/workflows/build-rpm.fedora.43.yml
    build_container: fedora:43
    release_label: fedora43
    artifact_name: rpm-package-fedora43
    patch: fedora.43
    supports:
      - fedora-43
  fedora44:
    workflow: .github/workflows/build-rpm.fedora.44.yml
    build_container: fedora:44
    release_label: fedora44
    artifact_name: rpm-package-fedora44
    patch: fedora.44
    supports:
      - fedora-44
  el10:
    workflow: .github/workflows/build-rpm.el10.yml
    build_container: centos:stream10
    release_label: el10
    artifact_name: rpm-package-el10
    patch: el10
    supports:
      - rhel-10
      - centos-stream-10
      - almalinux-10
      - rockylinux-10

deb:
  debian12:
    workflow: .github/workflows/build-deb.yml
    build_container: debian:12
    release_label: debian12
    artifact_name: deb-package-debian12
    patch: debian.12
    supports:
      - debian-12
  debian13:
    workflow: .github/workflows/build-deb.debian.13.yml
    build_container: debian:sid
    release_label: debian13
    artifact_name: deb-package-debian13
    patch: debian.13
    supports:
      - debian-13
  ubuntu24.04:
    workflow: .github/workflows/build-deb.ubuntu.24.04.yml
    build_container: ubuntu:24.04
    release_label: ubuntu24.04
    artifact_name: deb-package-ubuntu2404
    patch: ubuntu.24.04
    supports:
      - ubuntu-24.04
      - linuxmint-22
  ubuntu26.04:
    workflow: .github/workflows/build-deb.ubuntu.26.04.yml
    build_container: ubuntu:devel
    release_label: ubuntu26.04
    artifact_name: deb-package-ubuntu2604
    patch: ubuntu.26.04
    supports:
      - ubuntu-26.04

appimage:
  linux-baseline:
    workflow: .github/workflows/build-appimage.yml
    build_container: debian:12
    release_label: linux-baseline
    artifact_name: appimage-linux-baseline
    patch: linux-baseline
    supports:
      - any-linux-glibc-2.35+

aur:
  arch:
    workflow: .github/workflows/build-aur.yml
    publish_workflow: .github/workflows/publish-aur.yml
    build_container: archlinux:base-devel
    release_label: aur-arch
    artifact_name: aur-arch
    metadata_artifact_name: aur-arch-srcinfo
    patch: arch
    supports:
      - arch
      - manjaro
      - endeavour
      - garuda

flatpak:
  org.gnome.Platform.49:
    workflow: .github/workflows/build-flatpak.gnome49.yml
    build_container: ubuntu-24.04
    release_label: flatpak-gnome49
    artifact_name: flatpak-package-gnome49
    patch: org.gnome.Platform.49
    supports:
      - org.gnome.Platform//49
  org.gnome.Platform.50:
    workflow: .github/workflows/build-flatpak.yml
    build_container: ubuntu-24.04
    release_label: flatpak-gnome50
    artifact_name: flatpak-package
    patch: org.gnome.Platform.50
    supports:
      - org.gnome.Platform//50

snap:
  core24:
    workflow: .github/workflows/build-snap.yml
    build_container: ubuntu-24.04
    release_label: snap-core24
    artifact_name: snap-package
    patch: core24
    supports:
      - core24
  core26:
    workflow: .github/workflows/build-snap.core26.yml
    build_container: ubuntu-24.04
    release_label: snap-core26
    artifact_name: snap-package-core26
    patch: core26
    supports:
      - core26
