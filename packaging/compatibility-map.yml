compatibility_gates:
  glibc:
    minimum: "2.35"
    description: "Minimum glibc for compiled Rust/Tauri binary to link and run"
  musl:
    description: "Alpine APK targets use musl instead of glibc; no minimum glibc applies"
  webkitgtk:
    minimum: "4.1"
    description: "WebKitGTK 4.1 with GTK 3 must be available in target repos or runtime"

webkitgtk_runtime:
  deb: libwebkit2gtk-4.1-0
  rpm: webkit2gtk4.1
  arch: webkit2gtk-4.1
  build_deb: libwebkit2gtk-4.1-dev
  build_rpm: webkit2gtk4.1-devel

