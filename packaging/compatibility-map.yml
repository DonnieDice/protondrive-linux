      gates:
        glibc: fail
        webkitgtk: fail
      reason: "Both gates fail. glibc 2.28 is below the 2.35 minimum and WebKitGTK 4.1 is not available."
  apk:
  alpine320:
    status: promoted
    gates:
      glibc: musl-pass
      webkitgtk: pass
    reason: "Promoted from not-primary to roadmap-patch-ready to release-gated. WebKitGTK 4.1 (v2.44.1) available in Alpine 3.20 repos. CI green, smoke test passed on Alpine 3.20 host on 2026-05-16."
  alpine322:
    status: promoted
    gates:
      glibc: musl-pass
      webkitgtk: pass
    reason: "Promoted from roadmap-patch-ready to release-gated. WebKitGTK 4.1 (v2.48.1) available in Alpine 3.22 repos. CI green, smoke test passed on Alpine 3.22 host on 2026-05-16."

architectures:
  release_gate:
  - x86_64
  planned:
  - aarch64
  legacy:
  - armv7
  - x86
  experimental:
  - riscv64

architecture_details:
  x86_64:
    status: release-gated
    notes: "current artifact architecture"
  aarch64:
    status: roadmap
    notes: "next practical architecture for AppImage, DEB, RPM, Flatpak, Snap, and AUR"
  armv7:
    status: legacy
    notes: "32-bit ARM including RPi 2/3; WebKitGTK 4.1 cross-compilation and runtime on armv7 must be verified before any workflow is added; users can use AppImage if glibc permits"
  x86:
    status: legacy
    notes: "32-bit x86; no native packages planned; users can use AppImage if glibc permits"
  riscv64:
    status: experimental
    notes: "requires separate build/test work"
