roadmap_patch_ready:
  rpm:
  opensuse_tumbleweed:
    status: release-gated
    gates:
      glibc: pass
      webkitgtk: pass
    runtime_smoke:
      status: pass
      evidence: remote artifact install and launch on openSUSE Tumbleweed host
    workflow: .github/workflows/build-rpm.opensuse.tumbleweed.yml
    build_container: opensuse/tumbleweed:latest
    release_label: opensuse-tumbleweed
    artifact_name: rpm-package-opensuse-tumbleweed
    patch: opensuse.tumbleweed
    supports:
    - opensuse-tumbleweed
    opensuse_leap16:
      status: roadmap-patch-ready
      gates:
        glibc: pass
        webkitgtk: pass
      workflow: null
      build_container: registry.opensuse.org/opensuse/leap:16.0
      release_label: opensuse-leap16
      artifact_name: rpm-package-opensuse-leap16
      patch: opensuse.leap.16
      supports:
      - opensuse-leap-16
      before_release_gate:
      - add zypper-based RPM workflow
      - validate runtime install and login smoke test on Leap 16
  apk:
    alpine320:
      status: release-gated
      gates:
        glibc: musl-pass
        webkitgtk: pass
      runtime_smoke:
        status: pass
        evidence: CI artifact installed and launched on Alpine 3.20 host, Proton login API responded
      workflow: .github/workflows/build-apk.alpine.3.20.yml
      build_container: alpine:3.20
      release_label: alpine320
      artifact_name: apk-package-alpine320
      patch: alpine.3.20
      cargo_config: |
        [target.x86_64-unknown-linux-musl]
        linker = "gcc"
        rustflags = ["-C", "target-feature=-crt-static"]
      supports:
      - alpine-3.20
  alpine322:
    status: release-gated
    gates:
      glibc: musl-pass
      webkitgtk: pass
    runtime_smoke:
      status: pass
      evidence: CI artifact installed and launched on Alpine 3.22 host, Proton login API responded, Drive file listing loaded
    workflow: .github/workflows/build-apk.alpine.3.22.yml
    build_container: alpine:3.22
    release_label: alpine322
    artifact_name: apk-package-alpine322
    patch: alpine.3.22
    cargo_config: |
      [target.x86_64-unknown-linux-musl]
      linker = "gcc"
      rustflags = ["-C", "target-feature=-crt-static"]
    supports:
    - alpine-3.22
  alpine323:
    status: release-gated
    gates:
      glibc: musl-pass
      webkitgtk: pass
    runtime_smoke:
      status: pass
      evidence: CI artifact installed and launched on Alpine 3.23 host, Proton login API responded, D-Bus session auto-launch and AT_SPI_BUS_ADDRESS=/dev/null workaround applied
    workflow: .github/workflows/build-apk.alpine.3.23.yml
    build_container: alpine:3.23
    release_label: alpine323
    artifact_name: apk-package-alpine323
    patch: alpine.3.23
    cargo_config: |
      [target.x86_64-unknown-linux-musl]
      linker = "gcc"
      rustflags = ["-C", "target-feature=-crt-static"]
    supports:
      - alpine-3.23

