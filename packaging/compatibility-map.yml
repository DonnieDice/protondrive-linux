rpm:
  fedora40-compat:
    build_container: fedora:40
    release_label: fedora40-41
    artifact_name: rpm-fedora40-compat
    supports:
      - fedora-40
      - fedora-41
  fedora42-compat:
    build_container: fedora:42
    release_label: fedora42-44
    artifact_name: rpm-fedora42-compat
    supports:
      - fedora-42
      - fedora-43
      - fedora-44

deb:
  debian12-compat:
    build_container: debian:12
    release_label: debian12
    artifact_name: deb-debian12-compat
    supports:
      - debian-12
  debian13-compat:
    build_container: debian:13
    release_label: debian13
    artifact_name: deb-debian13-compat
    supports:
      - debian-13
  ubuntu22.04-compat:
    build_container: ubuntu:22.04
    release_label: ubuntu22.04
    artifact_name: deb-ubuntu2204-compat
    supports:
      - ubuntu-22.04
      - linuxmint-21
      - zorin-17
      - popos-22.04
  ubuntu24.04-compat:
    build_container: ubuntu:24.04
    release_label: ubuntu24.04
    artifact_name: deb-ubuntu2404-compat
    supports:
      - ubuntu-24.04
      - linuxmint-22

appimage:
  generic:
    build_container: debian:12
    release_label: linux-x86_64
    artifact_name: appimage-package
    supports:
      - unsupported-or-untested-distros
      - opensuse
      - mageia
      - void
      - nixos-best-effort

aur:
  aur-bin:
    build_container: archlinux:base-devel
    release_label: aur-bin
    artifact_name: aur-srcinfo
    supports:
      - arch
      - endeavour
      - manjaro-best-effort
      - garuda-best-effort
