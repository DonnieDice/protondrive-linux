name: proton-drive
version: "PLACEHOLDER"
summary: Proton Drive Linux Desktop Client
description: |
  Fast, lightweight, and unofficial desktop GUI client for Proton Drive on Linux.
  Built with Tauri and Rust for a native-performance experience.
grade: stable
confinement: strict
base: core24

apps:
  proton-drive:
    command: usr/bin/proton-drive-wrapper
    environment:
      WEBKIT_DISABLE_DMABUF_RENDERER: "1"
      WEBKIT_DISABLE_COMPOSITING_MODE: "1"
      GDK_GL: software
      WEBKIT_NETWORK_PROCESS_PATH: $SNAP/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1/WebKitNetworkProcess
      WEBKIT_WEB_PROCESS_PATH: $SNAP/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1/WebKitWebProcess
      WEBKIT_GPU_PROCESS_PATH: $SNAP/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1/WebKitGPUProcess
      WEBKIT_INJECTED_BUNDLE_PATH: $SNAP/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1/injected-bundle
    desktop: usr/share/applications/com.proton.drive.desktop
    plugs:
    - home
    - network
    - network-bind
    - network-status
    - desktop
    - desktop-legacy
    - x11
    - wayland
    - opengl
    - audio-playback
    - browser-support
    - password-manager-service
    - dbus

plugs:
  dbus:
    interface: dbus
    bus: session
    name: com.proton.drive

parts:
  proton-drive:
    plugin: nil
    source: .
    override-build: |
      install -Dm755 src-tauri/target/release/proton-drive "$SNAPCRAFT_PART_INSTALL/usr/bin/proton-drive"
      install -Dm755 packaging/snap/proton-drive-wrapper.sh "$SNAPCRAFT_PART_INSTALL/usr/bin/proton-drive-wrapper"
      install -Dm644 packaging/snap/com.proton.drive.desktop "$SNAPCRAFT_PART_INSTALL/usr/share/applications/com.proton.drive.desktop"
      mkdir -p "$SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/32x32/apps"
      mkdir -p "$SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/128x128/apps"
      mkdir -p "$SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/scalable/apps"
      cp src-tauri/icons/32x32.png "$SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/32x32/apps/com.proton.drive.png"
      cp src-tauri/icons/128x128.png "$SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/128x128/apps/com.proton.drive.png"
      cp src-tauri/icons/proton-drive.svg "$SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/scalable/apps/com.proton.drive.svg"
    stage-packages:
    - libssl3
    - libwebkit2gtk-4.1-0
    - libgtk-3-0
    - libayatana-appindicator3-1
    - librsvg2-2
    - libsoup-3.0-0
